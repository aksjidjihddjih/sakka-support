<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作家登録 - KANKETSU</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #f9fafb; --card-bg: #ffffff; --text-main: #000000; --text-sub: #4b5563; --border-color: #000000; --border-light: #e5e7eb; --border-width: 1.5px; --btn-bg: #000000; --btn-text: #ffffff; --btn-hover: #374151; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; line-height: 1.6; }
        .header { padding: 32px 20px; text-align: center; }
        .brand-logo { font-size: 28px; font-weight: 900; letter-spacing: 1px; color: var(--text-main); text-decoration: none; }
        .container { max-width: 440px; margin: 0 auto 40px auto; padding: 0 20px; flex: 1; width: 100%; box-sizing: border-box; }
        .card { background-color: var(--card-bg); border: var(--border-width) solid var(--border-color); border-radius: 12px; padding: 40px 32px; box-shadow: 4px 4px 0px rgba(0,0,0,1); text-align: center;}
        .card h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px 0; }
        .card p.desc { font-size: 14px; color: var(--text-sub); margin-bottom: 24px; }
        .social-btn { display: flex; justify-content: center; align-items: center; gap: 12px; width: 100%; padding: 12px; font-size: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: var(--border-width) solid var(--border-color); box-sizing: border-box; background: #fff; color: var(--text-main); margin-bottom: 12px; text-decoration: none; }
        .social-btn:hover { background-color: #f3f4f6; transform: translate(-1px, -1px); box-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        .divider { display: flex; align-items: center; text-align: center; margin: 24px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-light); }
        .divider span { padding: 0 16px; color: var(--text-sub); font-size: 12px; font-weight: 600; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
        .form-control { width: 100%; padding: 12px 16px; font-size: 15px; border: 1px solid var(--border-light); border-radius: 8px; background-color: #f9fafb; color: var(--text-main); box-sizing: border-box; transition: all 0.2s; outline: none; }
        .form-control:focus { border-color: var(--border-color); background-color: #fff; }
        .terms-check { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 24px; text-align: left; background: #f9fafb; padding: 12px; border-radius: 8px; border: 1px solid var(--border-light); }
        .terms-check input { margin-top: 3px; cursor: pointer; accent-color: var(--text-main); width: 16px; height: 16px; }
        .terms-check label { font-size: 12px; color: var(--text-sub); line-height: 1.5; cursor: pointer; }
        .terms-check a { color: var(--text-main); font-weight: 700; }
        .btn { display: inline-flex; justify-content: center; align-items: center; width: 100%; padding: 14px 24px; font-size: 15px; font-weight: 800; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: var(--border-width) solid var(--border-color); box-sizing: border-box; }
        .btn-primary { background-color: var(--btn-bg); color: var(--btn-text); }
        .btn-primary:hover { background-color: var(--btn-hover); transform: translate(-1px, -1px); box-shadow: 2px 2px 0px rgba(0,0,0,0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .login-link { margin-top: 24px; font-size: 14px; color: var(--text-sub); }
        .login-link a { color: var(--text-main); font-weight: 700; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        #successState { display: none; text-align: center; }
        #successState svg { width: 64px; height: 64px; color: #16a34a; margin-bottom: 16px; }
        .error-message { color: #dc2626; font-size: 13px; font-weight: 600; margin-top: 8px; display: none; text-align: left;}
        .turnstile-wrap { margin-bottom: 20px; display: flex; justify-content: center; }
        
        /* ⭐️ パスワード表示トグル用スタイル */
        .input-wrapper { position: relative; width: 100%; }
        .pwd-toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: transparent; border: none; padding: 0; cursor: pointer; color: var(--text-sub); display: flex; align-items: center; justify-content: center; z-index: 2;}
        .pwd-toggle-btn:hover { color: var(--text-main); }
        .pwd-toggle-btn svg { width: 20px; height: 20px; }
        .form-control.pwd-input { padding-right: 44px; }
        /* ブラウザ標準の目玉マークを強制非表示 */
        input[type="password"]::-ms-reveal, input[type="password"]::-ms-clear { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="brand-logo">KANKETSU</a>
    </div>

    <div class="container">
        <div class="card">
            
            <div id="successState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                <h2 style="margin: 0 0 12px 0; font-size: 20px;">確認メールを送信しました</h2>
                <p style="font-size: 14px; color: var(--text-sub); line-height: 1.6; margin-bottom: 24px;">
                    入力されたメールアドレスに認証リンクを送信しました。<br>
                    <strong>メール内のリンクをクリックして、登録を完了させてください。</strong>
                </p>
                <p style="font-size: 12px; color: #9ca3af;">※迷惑メールフォルダに振り分けられる場合があります。</p>
            </div>

            <div id="formState">
                <h1>作家登録 (無料)</h1>
                <p class="desc">支援受付ページを作成し、活動の支援を受けましょう。</p>
                
                <button class="social-btn" onclick="signInWithProvider('google')">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Googleで登録
                </button>
                <button class="social-btn" onclick="signInWithProvider('x')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    X (Twitter)で登録
                </button>

                <div class="divider"><span>またはメールアドレスで登録</span></div>

                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="username" required>
                </div>
                
                <div class="form-group">
                    <label>パスワード (8文字以上、英大・小・数字必須)</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-control pwd-input" placeholder="8文字以上（英大・小・数字必須）" autocomplete="new-password" required>
                        <button type="button" class="pwd-toggle-btn" onclick="togglePassword('password', this)" tabindex="-1">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>パスワード（確認）</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" class="form-control pwd-input" placeholder="もう一度入力してください" autocomplete="new-password" required>
                        <button type="button" class="pwd-toggle-btn" onclick="togglePassword('confirmPassword', this)" tabindex="-1">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <div class="turnstile-wrap">
                    <div class="cf-turnstile" 
                         data-sitekey="0x4AAAAAADpftKeLBvaOQqcA" 
                         data-callback="onTurnstileVerify"
                         data-expired-callback="onTurnstileExpire"></div>
                </div>

                <div class="terms-check">
                    <input type="checkbox" id="agreeTerms">
                    <label for="agreeTerms">
                        <a href="terms.html" target="_blank">利用規約</a> および <a href="privacy.html" target="_blank">プライバシーポリシー</a> に同意して登録します。
                    </label>
                </div>

                <div id="errorMsg" class="error-message"></div>

                <button class="btn btn-primary" id="signupBtn" onclick="handleSignup()" disabled>アカウントを作成</button>
                
                <div class="login-link">
                    すでにアカウントをお持ちの方は <a href="login.html">ログイン</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let turnstileToken = null;

        // ⭐️ パスワードの表示・非表示切り替え用関数
        window.togglePassword = function(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
            } else {
                input.type = 'password';
                btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
            }
        };

        window.onTurnstileVerify = function(token) {
            turnstileToken = token;
            validateFormState();
        };

        window.onTurnstileExpire = function() {
            turnstileToken = null;
            validateFormState();
        };

        document.getElementById('agreeTerms').addEventListener('change', function() {
            validateFormState();
        });

        function validateFormState() {
            const isAgreed = document.getElementById('agreeTerms').checked;
            const isHuman = turnstileToken !== null;
            document.getElementById('signupBtn').disabled = !(isAgreed && isHuman);
        }

        async function signInWithProvider(provider) {
            if (!document.getElementById('agreeTerms').checked) {
                return alert('利用規約およびプライバシーポリシーに同意してください。');
            }
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: provider,
                    options: { redirectTo: window.location.origin + '/dashboard.html' }
                });
                if (error) throw error;
            } catch (error) {
                alert('エラーが発生しました: ' + error.message);
            }
        }

        async function handleSignup() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('signupBtn');
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.style.display = 'none';

            if (!email || !password) {
                errorMsg.innerText = 'メールアドレスとパスワードを入力してください。';
                errorMsg.style.display = 'block';
                return;
            }
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) {
                errorMsg.innerText = 'パスワードと確認用のパスワードが一致しません。';
                errorMsg.style.display = 'block';
                return;
            }
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
            if (!passwordRegex.test(password)) {
                errorMsg.innerText = 'パスワードは8文字以上で、英大文字・英小文字・数字をすべて含める必要があります。';
                errorMsg.style.display = 'block';
                return;
            }
            if (!turnstileToken) {
                errorMsg.innerText = 'セキュリティ認証が完了していません。';
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerText = '送信中...';

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        captchaToken: turnstileToken
                    }
                });

                if (error) throw error;

                if (data.user && data.user.identities && data.user.identities.length === 0) {
                    throw new Error("このメールアドレスは既に登録されています。");
                }

                if (!data.session) {
                    document.getElementById('formState').style.display = 'none';
                    document.getElementById('successState').style.display = 'block';
                } else {
                    window.location.href = 'dashboard.html';
                }

            } catch (error) {
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
                
                if (window.turnstile) turnstile.reset();
                turnstileToken = null;
                validateFormState();
                
                btn.disabled = false;
                btn.innerText = 'アカウントを作成';
            }
        }
    </script>
</body>
</html>
