<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作家登録 - KANKETSU</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #f9fafb; --card-bg: #ffffff; --text-main: #000000; --text-sub: #4b5563; --border-color: #000000; --border-light: #e5e7eb; --border-width: 1.5px; --btn-bg: #000000; --btn-text: #ffffff; --btn-hover: #374151; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; line-height: 1.6; }
        .header { padding: 32px 20px; text-align: center; }
        .brand-logo { font-size: 28px; font-weight: 900; letter-spacing: 1px; color: var(--text-main); text-decoration: none; }
        .container { max-width: 440px; margin: 0 auto 40px auto; padding: 0 20px; flex: 1; width: 100%; box-sizing: border-box; }
        .card { background-color: var(--card-bg); border: var(--border-width) solid var(--border-color); border-radius: 12px; padding: 40px 32px; box-shadow: 4px 4px 0px rgba(0,0,0,1); text-align: center;}
        .card h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px 0; }
        .card p.desc { font-size: 14px; color: var(--text-sub); margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
        .form-control { width: 100%; padding: 12px 16px; font-size: 15px; border: 1px solid var(--border-light); border-radius: 8px; background-color: #f9fafb; color: var(--text-main); box-sizing: border-box; transition: all 0.2s; outline: none; }
        .form-control:focus { border-color: var(--border-color); background-color: #fff; }
        .btn { display: inline-flex; justify-content: center; align-items: center; width: 100%; padding: 14px 24px; font-size: 15px; font-weight: 800; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: var(--border-width) solid var(--border-color); box-sizing: border-box; margin-top: 12px;}
        .btn-primary { background-color: var(--btn-bg); color: var(--btn-text); }
        .btn-primary:hover { background-color: var(--btn-hover); transform: translate(-1px, -1px); box-shadow: 2px 2px 0px rgba(0,0,0,0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .login-link { margin-top: 24px; font-size: 14px; color: var(--text-sub); }
        .login-link a { color: var(--text-main); font-weight: 700; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        .error-message { color: #dc2626; font-size: 13px; font-weight: 600; margin-top: 8px; display: none; text-align: left; background: #fee2e2; padding: 12px; border-radius: 8px; border: 1px solid #fca5a5; margin-bottom: 20px;}
        .turnstile-wrap { margin-bottom: 20px; display: flex; justify-content: center; }
        .success-icon { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; background-color: #d1fae5; color: #065f46; border-radius: 50%; margin-bottom: 24px; border: var(--border-width) solid var(--border-color); box-shadow: 2px 2px 0px rgba(0,0,0,1); }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="brand-logo">KANKETSU</a>
    </div>

    <div class="container">
        <div class="card" id="formState">
            <h1>作家アカウント作成</h1>
            <p class="desc">今すぐ登録して、作品の支援受付を開始しましょう。</p>
            
            <div id="errorMsg" class="error-message"></div>

            <form id="signupForm" onsubmit="handleFormSubmit(event)">
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="username" required>
                </div>
                
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="password" class="form-control" placeholder="8文字以上（英大・小文字、数字必須）" autocomplete="new-password" required>
                </div>

                <div class="form-group">
                    <label>パスワード（確認）</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="もう一度入力してください" autocomplete="new-password" required>
                </div>

                <div class="turnstile-wrap">
                    <div class="cf-turnstile" 
                         data-sitekey="0x4AAAAAADpftKeLBvaOQqcA" 
                         data-callback="onTurnstileVerify"
                         data-expired-callback="onTurnstileExpire"></div>
                </div>

                <button type="submit" class="btn btn-primary" id="signupBtn" disabled>アカウントを作成</button>
            </form>
            
            <div class="login-link">
                既にアカウントをお持ちの方は <a href="login.html">ログイン</a>
            </div>
        </div>

        <div class="card" id="successState" style="display: none;">
            <div class="success-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h1>確認メールを送信しました</h1>
            <p class="desc" style="text-align: left; margin-bottom: 0; line-height: 1.8;">
                入力されたメールアドレス宛てにアカウント有効化のための確認メールをお送りしました。<br><br>
                メール内に記載されているリンクをクリックすると登録が完了し、管理画面にログインできるようになります。
            </p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let turnstileToken = null;

        window.onTurnstileVerify = function(token) {
            turnstileToken = token;
            validateFormState();
        };

        window.onTurnstileExpire = function() {
            turnstileToken = null;
            validateFormState();
        };

        function validateFormState() {
            const isHuman = turnstileToken !== null;
            document.getElementById('signupBtn').disabled = !isHuman;
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            handleSignup();
        }

        async function handleSignup() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('signupBtn');
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.style.display = 'none';

            // 💡 セキュリティ対策1: パスワードの二重チェック（タイポ防止）
            if (password !== confirmPassword) {
                errorMsg.innerText = 'パスワードと確認用のパスワードが一致しません。';
                errorMsg.style.display = 'block';
                return;
            }

            // 💡 セキュリティ対策2: 英大・小文字・数字混在の8文字以上を厳格に課すバリデーション
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
            if (!passwordRegex.test(password)) {
                errorMsg.innerText = 'セキュリティ強化のため、パスワードは8文字以上、かつ英語の大文字・小文字・数字をすべて最低1文字以上含める必要があります。';
                errorMsg.style.display = 'block';
                return;
            }

            if (!turnstileToken) {
                errorMsg.innerText = 'セキュリティ認証が完了していません。';
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerText = '送信中...';

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        captchaToken: turnstileToken
                    }
                });

                if (error) throw error;

                if (data.user && data.user.identities && data.user.identities.length === 0) {
                    throw new Error("このメールアドレスは既に登録されています。");
                }

                if (!data.session) {
                    document.getElementById('formState').style.display = 'none';
                    document.getElementById('successState').style.display = 'block';
                } else {
                    window.location.href = 'dashboard.html';
                }

            } catch (error) {
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
                
                if (window.turnstile) turnstile.reset();
                turnstileToken = null;
                validateFormState();
                
                btn.disabled = false;
                btn.innerText = 'アカウントを作成';
            }
        }
    </script>
</body>
</html>
