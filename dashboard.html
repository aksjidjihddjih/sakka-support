<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダッシュボード - KANKETSU</title>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.4/dist/turbo.es2017-esm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-color: #f3f4f6; --card-bg: #ffffff; --text-main: #000000; --text-sub: #4b5563;
            --border-color: #000000; --border-light: #e5e7eb; --border-width: 1.5px;
            --btn-bg: #000000; --btn-text: #ffffff; --btn-hover: #374151;
            --sidebar-bg: #000000; --sidebar-text: #d1d5db;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        .icon { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; display: inline-block; vertical-align: middle; }
        .icon-sm { width: 16px; height: 16px; }

        .app-container { display: flex; min-height: 100vh; flex-direction: column; }
        .mobile-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--sidebar-bg); color: #fff; position: sticky; top: 0; z-index: 20; }
        .mobile-header .brand-logo { margin: 0; padding: 0; }
        .hamburger { background: transparent; border: none; color: #fff; cursor: pointer; padding: 4px; }

        .sidebar { background-color: var(--sidebar-bg); color: var(--sidebar-text); width: 260px; height: 100vh; padding: 32px 0 24px 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 30; transform: translateX(-100%); transition: transform 0.3s ease; box-sizing: border-box; }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 25; display: none; opacity: 0; transition: opacity 0.3s; }
        .sidebar-overlay.show { display: block; opacity: 1; }
        
        .brand-logo { font-size: 20px; font-weight: 800; letter-spacing: 1px; color: #fff; text-decoration: none; padding: 0 24px; margin-bottom: 40px; display: block;}

        .sidebar-nav { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding: 0 12px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--sidebar-text); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 8px; transition: all 0.2s; cursor: pointer; border: none; background: transparent; text-align: left; width: 100%; box-sizing: border-box; }
        .nav-item:hover, .nav-item.active { background-color: #1f2937; color: #fff; }
        .nav-divider { height: 1px; background-color: #374151; margin: 12px 16px; }

        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            .mobile-header { display: none; }
            .sidebar { position: sticky; transform: translateX(0); }
        }

        .account-wrapper { position: relative; padding: 0 12px; margin-top: auto; }
        .account-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 12px 16px; background: transparent; border: none; border-radius: 8px; color: var(--sidebar-text); cursor: pointer; transition: all 0.2s; }
        .account-btn:hover { background-color: #1f2937; color: #fff; }
        .account-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 32px; height: 32px; background-color: #4b5563; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 14px; }
        .account-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; text-align: left;}

        .account-popup { position: absolute; bottom: calc(100% + 8px); left: 12px; right: 12px; background: #fff; border: var(--border-width) solid var(--border-color); border-radius: 8px; box-shadow: 2px 2px 0px rgba(0,0,0,1); padding: 8px 0; display: none; z-index: 100; }
        .account-popup.show { display: block; }
        .popup-item { display: flex; align-items: center; gap: 12px; width: 100%; padding: 10px 16px; background: transparent; border: none; text-align: left; font-size: 14px; font-weight: 600; color: var(--text-main); cursor: pointer; transition: background 0.2s; box-sizing: border-box; text-decoration: none;}
        .popup-item:hover { background-color: var(--bg-color); }
        .popup-divider { height: 1px; background-color: var(--border-light); margin: 4px 0; }
        .popup-item.text-danger { color: #dc2626; }

        .main-content { flex: 1; padding: 32px 20px; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; display: flex; flex-direction: column;}
        @media (min-width: 768px) { .main-content { padding: 48px; } }

        .card { background-color: var(--card-bg); border: var(--border-width) solid var(--border-color); border-radius: 12px; padding: 24px; margin-bottom: 32px; box-shadow: 2px 2px 0px rgba(0,0,0,1); }
        @media (min-width: 768px) { .card { padding: 32px; } }
        .card-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); }
        .card-title { font-size: 18px; font-weight: 700; margin: 0; }
        .card-desc { font-size: 13px; color: var(--text-sub); margin: 4px 0 0 0; }
        
        .btn { display: inline-flex; justify-content: center; align-items: center; width: 100%; padding: 12px 24px; font-size: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: var(--border-width) solid var(--border-color); box-sizing: border-box; text-decoration: none;}
        .btn-primary { background-color: var(--btn-bg); color: var(--btn-text); }
        .btn-primary:hover { background-color: var(--btn-hover); border-color: var(--btn-hover); }
        .btn-outline { background-color: transparent; color: var(--text-main); }
        .btn-outline:hover { background-color: var(--bg-color); }
        .btn-sm { padding: 8px 16px; font-size: 13px; width: auto; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .form-control { width: 100%; padding: 12px 16px; font-size: 15px; border: 1px solid var(--border-light); border-radius: 8px; background-color: #fff; color: var(--text-main); box-sizing: border-box; transition: all 0.2s; }
        .form-control:focus { outline: none; border-color: var(--border-color); box-shadow: 0 0 0 1px var(--border-color); }
        textarea.form-control { resize: vertical; min-height: 120px; }

        .share-box { display: flex; align-items: center; border: 1px solid var(--border-light); border-radius: 8px; padding: 4px; background: #f9fafb; margin-bottom: 32px;}
        .share-url { flex: 1; padding: 8px 12px; font-size: 14px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; user-select: all;}

        .item-list { display: flex; flex-direction: column; gap: 12px; }
        
        /* ★修正：ホバー時のモーションを削除し、背景色変更のみに */
        .item-card { display: flex; justify-content: space-between; align-items: center; padding: 16px; border: 1px solid var(--border-light); border-radius: 8px; background-color: #fff; transition: background-color 0.2s ease; }
        .item-card:hover { background-color: #f9fafb; cursor: pointer; }
        
        .item-info h4 { margin: 0 0 4px 0; font-size: 15px; font-weight: 600; }
        .item-info p { margin: 0; font-size: 13px; color: var(--text-sub); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: opacity 0.2s ease; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: #fff; width: 100%; max-width: 500px; border-radius: 12px; padding: 32px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); transform: translateY(20px); transition: transform 0.2s ease; max-height: 90vh; overflow-y: auto; box-sizing: border-box; margin: 20px;}
        .modal-overlay.show .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-title { font-size: 18px; font-weight: 600; margin: 0; }
        .modal-close { background: none; border: none; font-size: 24px; color: var(--text-sub); cursor: pointer; line-height: 1; }
        .modal-close:hover { color: var(--text-main); }
        .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; border-top: 1px solid var(--border-light); padding-top: 24px; }
        .modal-footer-actions { display: flex; gap: 12px; justify-content: flex-end; flex: 1; }

        .site-footer { margin-top: auto; padding-top: 48px; border-top: 1px solid var(--border-light); text-align: center; color: var(--text-sub); font-size: 13px; }
        .site-footer a { color: var(--text-sub); text-decoration: none; margin: 0 8px; cursor: pointer;}
        .site-footer a:hover { text-decoration: underline; color: var(--text-main); }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="mobile-header">
            <a href="dashboard.html" class="brand-logo">KANKETSU</a>
            <button class="hamburger" onclick="window.toggleSidebar()">
                <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay" onclick="window.toggleSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <a href="dashboard.html" class="brand-logo" style="display: none;">KANKETSU</a>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item active">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> ホーム
                </a>
                <a href="sales.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="9" x2="12" y2="22"></line><polyline points="6 3 12 9 18 3"></polyline><line x1="6" y1="13" x2="18" y2="13"></line><line x1="6" y1="17" x2="18" y2="17"></line></svg> 支援履歴（売上明細）
                </a>
                <a href="stripe.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg> 振込先・口座管理
                </a>
            </nav>

            <div class="account-wrapper">
                <div class="account-popup" id="accountPopup">
                    <button class="popup-item text-danger" onclick="window.logout()">
                        <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg> ログアウト
                    </button>
                </div>
                <button class="account-btn" onclick="window.toggleAccountPopup(event)">
                    <div class="account-info">
                        <div class="avatar" id="userAvatar">？</div>
                        <span class="account-name" id="userNameDisplay">読み込み中...</span>
                    </div>
                    <svg class="icon icon-sm" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <h1 style="font-size: 24px; margin-top: 0; margin-bottom: 24px;">ホーム</h1>
            
            <p style="font-size: 13px; font-weight: 600; margin-bottom: 8px;">あなたの支援受付ページURL</p>
            <div class="share-box">
                <div class="share-url" id="profileUrlText">取得中...</div>
                <button class="btn btn-primary btn-sm" onclick="window.copyUrl()">コピー</button>
            </div>

            <div class="card" style="text-align: center; padding: 48px 20px;">
                <p style="font-size: 14px; color: var(--text-sub); margin: 0 0 8px 0; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Balance</p>
                <h2 style="font-size: 48px; font-weight: 800; margin: 0 0 32px 0; letter-spacing: -1px;" id="balanceText">¥0</h2>
                <div style="max-width: 280px; margin: 0 auto;">
                    <button class="btn btn-primary" onclick="window.requestWithdrawal(event)">売上を引き出す</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">活動サイトリンク</h2>
                        <p class="card-desc">読者に表示するあなたのマイページURL</p>
                    </div>
                    <button class="btn btn-outline btn-sm" onclick="window.openAddModal('linkModal')">+ 追加</button>
                </div>
                <div class="item-list" id="linksList">
                    <p style="font-size: 14px; color: var(--text-sub);">読み込み中...</p>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">支援へのお礼メッセージ</h2>
                        <p class="card-desc">作品指定がない支援に対する共通メッセージ</p>
                    </div>
                    <button class="btn btn-outline btn-sm" onclick="window.openAddModal('msgModal')">+ 追加</button>
                </div>
                <div class="item-list" id="messagesList">
                    <p style="font-size: 14px; color: var(--text-sub);">読み込み中...</p>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div>
                        <h2 class="card-title">作品と専用メッセージ</h2>
                        <p class="card-desc">特定の作品に対する支援と、その限定の裏話など</p>
                    </div>
                    <button class="btn btn-outline btn-sm" onclick="window.openAddModal('workModal')">+ 追加</button>
                </div>
                <div class="item-list" id="worksList">
                    <p style="font-size: 14px; color: var(--text-sub);">読み込み中...</p>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="linkModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="linkModalTitle">活動サイトを追加</h3>
                <button class="modal-close" onclick="window.closeModal('linkModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>サイト名 (例: 小説家になろう)</label>
                <input type="text" id="linkTitle" class="form-control" placeholder="サイト名を入力">
            </div>
            <div class="form-group">
                <label>マイページURL</label>
                <input type="url" id="linkUrl" class="form-control" placeholder="https://...">
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline btn-sm text-danger" id="linkDeleteBtn" style="display:none; color:#dc2626; border-color:#dc2626;" onclick="window.deleteItem('creator_links')">削除</button>
                <div class="modal-footer-actions">
                    <button class="btn btn-outline btn-sm" onclick="window.closeModal('linkModal')">キャンセル</button>
                    <button class="btn btn-primary btn-sm" onclick="window.saveLink()">保存する</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="msgModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="msgModalTitle">お礼メッセージを追加</h3>
                <button class="modal-close" onclick="window.closeModal('msgModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>管理用タイトル (読者には見えません)</label>
                <input type="text" id="msgTitle" class="form-control" placeholder="例: 標準メッセージ">
            </div>
            <div class="form-group">
                <label>メッセージ内容</label>
                <textarea id="msgContent" class="form-control" placeholder="支援へのお礼を書きましょう"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline btn-sm text-danger" id="msgDeleteBtn" style="display:none; color:#dc2626; border-color:#dc2626;" onclick="window.deleteItem('creator_messages')">削除</button>
                <div class="modal-footer-actions">
                    <button class="btn btn-outline btn-sm" onclick="window.closeModal('msgModal')">キャンセル</button>
                    <button class="btn btn-primary btn-sm" onclick="window.saveMessage()">保存する</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="workModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="workModalTitle">作品を追加</h3>
                <button class="modal-close" onclick="window.closeModal('workModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>作品タイトル</label>
                <input type="text" id="workTitle" class="form-control" placeholder="作品名を入力">
            </div>
            <div class="form-group">
                <label>作品のURL</label>
                <input type="url" id="workUrl" class="form-control" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>この作品専用の限定メッセージ (任意)</label>
                <textarea id="workMessage" class="form-control" placeholder="作品の裏話などを書きましょう"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline btn-sm text-danger" id="workDeleteBtn" style="display:none; color:#dc2626; border-color:#dc2626;" onclick="window.deleteItem('works')">削除</button>
                <div class="modal-footer-actions">
                    <button class="btn btn-outline btn-sm" onclick="window.closeModal('workModal')">キャンセル</button>
                    <button class="btn btn-primary btn-sm" onclick="window.saveWork()">保存する</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUserId = null;
        let linksData = [], messagesData = [], worksData = [];
        let currentEditId = null; // 編集中のアイテムID

        async function initDashboard() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return window.location.href = 'login.html';
            currentUserId = session.user.id;

            // サイドバー等の全ページ共通要素の更新
            const nameEl = document.getElementById('userNameDisplay');
            if (nameEl) {
                const { data: creator } = await supabaseClient.from('creators').select('*').eq('id', currentUserId).single();
                if (creator) {
                    nameEl.innerText = creator.pen_name || "名無し作者";
                    document.getElementById('userAvatar').innerText = (creator.pen_name || "名").charAt(0);
                }
            }

            // ★エラー修正：ダッシュボード特有の要素が存在するか確認（sales.htmlからの誤作動防止）
            if (!document.getElementById('profileUrlText')) return;

            document.getElementById('profileUrlText').innerText = `${window.location.origin}/profile.html?id=${currentUserId}`;

            const { data: donations } = await supabaseClient.from('donations').select('net_amount').eq('creator_id', currentUserId).eq('status', 'pending');
            const totalBalance = donations ? donations.reduce((sum, d) => sum + Number(d.net_amount), 0) : 0;
            document.getElementById('balanceText').innerText = `¥${totalBalance.toLocaleString()}`;

            await loadAllData();
        }

        document.addEventListener('turbo:load', initDashboard);
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initDashboard); else initDashboard();

        async function loadAllData() {
            const [linksRes, msgsRes, worksRes] = await Promise.all([
                supabaseClient.from('creator_links').select('*').eq('creator_id', currentUserId).order('created_at', { ascending: false }),
                supabaseClient.from('creator_messages').select('*').eq('creator_id', currentUserId).order('created_at', { ascending: false }),
                supabaseClient.from('works').select('*').eq('creator_id', currentUserId).order('created_at', { ascending: false })
            ]);

            linksData = linksRes.data || [];
            messagesData = msgsRes.data || [];
            worksData = worksRes.data || [];

            renderList('linksList', linksData, 'linkModal', item => `<h4>${item.title}</h4><p>${item.url}</p>`);
            renderList('messagesList', messagesData, 'msgModal', item => `<h4>${item.title}</h4><p>${item.content.substring(0, 30)}...</p>`);
            renderList('worksList', worksData, 'workModal', item => `<h4>${item.title}</h4><p>${item.secret_message ? "限定メッセージ設定済み" : "メッセージ未設定"}</p>`);
        }

        function renderList(elementId, dataArray, modalId, htmlFormatFn) {
            const listEl = document.getElementById(elementId);
            if (!dataArray.length) { listEl.innerHTML = '<p style="font-size: 14px; color: var(--text-sub);">まだ登録されていません。</p>'; return; }
            
            listEl.innerHTML = dataArray.map(item => `
                <div class="item-card" onclick="window.openEditModal('${modalId}', ${item.id})">
                    <div class="item-info">${htmlFormatFn(item)}</div>
                    <div style="font-size: 13px; font-weight: 600; color: var(--text-sub);">編集</div>
                </div>
            `).join('');
        }

        // --- モーダルの開閉と編集ロジック ---
        window.openAddModal = function(modalId) {
            currentEditId = null;
            document.getElementById(modalId).classList.add('show');
            document.body.style.overflow = 'hidden';
            
            if(modalId === 'linkModal') {
                document.getElementById('linkModalTitle').innerText = '活動サイトを追加';
                document.getElementById('linkTitle').value = ''; document.getElementById('linkUrl').value = '';
                document.getElementById('linkDeleteBtn').style.display = 'none';
            } else if(modalId === 'msgModal') {
                document.getElementById('msgModalTitle').innerText = 'お礼メッセージを追加';
                document.getElementById('msgTitle').value = ''; document.getElementById('msgContent').value = '';
                document.getElementById('msgDeleteBtn').style.display = 'none';
            } else if(modalId === 'workModal') {
                document.getElementById('workModalTitle').innerText = '作品を追加';
                document.getElementById('workTitle').value = ''; document.getElementById('workUrl').value = ''; document.getElementById('workMessage').value = '';
                document.getElementById('workDeleteBtn').style.display = 'none';
            }
        };

        window.openEditModal = function(modalId, id) {
            currentEditId = id;
            document.getElementById(modalId).classList.add('show');
            document.body.style.overflow = 'hidden';

            if(modalId === 'linkModal') {
                const item = linksData.find(d => d.id === id);
                document.getElementById('linkModalTitle').innerText = '活動サイトを編集';
                document.getElementById('linkTitle').value = item.title; document.getElementById('linkUrl').value = item.url;
                document.getElementById('linkDeleteBtn').style.display = 'block';
            } else if(modalId === 'msgModal') {
                const item = messagesData.find(d => d.id === id);
                document.getElementById('msgModalTitle').innerText = 'お礼メッセージを編集';
                document.getElementById('msgTitle').value = item.title; document.getElementById('msgContent').value = item.content;
                document.getElementById('msgDeleteBtn').style.display = 'block';
            } else if(modalId === 'workModal') {
                const item = worksData.find(d => d.id === id);
                document.getElementById('workModalTitle').innerText = '作品を編集';
                document.getElementById('workTitle').value = item.title; document.getElementById('workUrl').value = item.work_url; document.getElementById('workMessage').value = item.secret_message;
                document.getElementById('workDeleteBtn').style.display = 'block';
            }
        };

        window.closeModal = function(id) { document.getElementById(id).classList.remove('show'); document.body.style.overflow = ''; };
        window.onclick = function(e) { if (e.target.classList.contains('modal-overlay')) { e.target.classList.remove('show'); document.body.style.overflow = ''; } };
        window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); };

        // --- データの保存・更新・削除 ---
        async function upsertData(tableName, dataObj, modalId) {
            let res;
            if (currentEditId) res = await supabaseClient.from(tableName).update(dataObj).eq('id', currentEditId);
            else res = await supabaseClient.from(tableName).insert([{ ...dataObj, creator_id: currentUserId }]);
            
            if (res.error) alert("保存エラー: " + res.error.message);
            else { window.closeModal(modalId); await loadAllData(); }
        }

        window.saveLink = () => upsertData('creator_links', { title: document.getElementById('linkTitle').value, url: document.getElementById('linkUrl').value }, 'linkModal');
        window.saveMessage = () => upsertData('creator_messages', { title: document.getElementById('msgTitle').value, content: document.getElementById('msgContent').value }, 'msgModal');
        window.saveWork = () => upsertData('works', { title: document.getElementById('workTitle').value, work_url: document.getElementById('workUrl').value, secret_message: document.getElementById('workMessage').value }, 'workModal');

        window.deleteItem = async function(tableName) {
            if(!confirm("本当に削除しますか？")) return;
            const { error } = await supabaseClient.from(tableName).delete().eq('id', currentEditId);
            if(error) alert("削除エラー: " + error.message);
            else {
                window.closeModal(tableName === 'creator_links' ? 'linkModal' : (tableName === 'works' ? 'workModal' : 'msgModal'));
                await loadAllData();
            }
        };

        window.requestWithdrawal = async function(e) { /* 省略（以前のコードと同じ） */ };
        window.copyUrl = () => navigator.clipboard.writeText(document.getElementById('profileUrlText').innerText).then(() => alert("URLをコピーしました！"));
        window.logout = async () => { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; };
        window.toggleAccountPopup = e => { e.stopPropagation(); document.getElementById('accountPopup').classList.toggle('show'); };
    </script>
</body>
</html>
