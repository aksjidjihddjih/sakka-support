<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANKETSU - 執筆をサポート</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 画面の高さいっぱいに広げ、フッターを常に一番下に押しやる設定を追加 */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f6f8; color: #333; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .header { background-color: #333; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-weight: bold; letter-spacing: 1px; font-size: 20px; }
        .btn-author-login { background-color: transparent; color: #fff; border: 1px solid #fff; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 14px; transition: 0.2s; }
        .btn-author-login:hover { background-color: rgba(255,255,255,0.1); }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; flex: 1; }
        
        .hero { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .hero h1 { color: #f57c00; margin-bottom: 15px; font-size: 24px; }
        .hero p { color: #555; line-height: 1.6; }

        .search-card { background-color: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .search-card h2 { margin: 0 0 15px 0; font-size: 18px; color: #1976d2; }
        
        .search-input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        .search-input:focus { border-color: #1976d2; outline: none; }
        
        .btn-search { display: block; width: 100%; background-color: #1976d2; color: white; border: none; padding: 12px 0; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-search:hover { background-color: #1565c0; }

        #searchResult { margin-top: 20px; }
        .btn-link { display: inline-block; background-color: #f57c00; color: white; text-decoration: none; padding: 8px 16px; border-radius: 4px; font-size: 14px; font-weight: bold; }
        .btn-link:hover { background-color: #e65100; }

        /* ★追加：フッター（規約リンクなど）のデザイン */
        .footer { background-color: #f4f6f8; text-align: center; padding: 20px; border-top: 1px solid #e0e0e0; margin-top: auto; }
        .footer-links { margin-bottom: 10px; }
        .footer-links a { color: #888; text-decoration: none; font-size: 12px; margin: 0 10px; transition: color 0.2s; }
        .footer-links a:hover { color: #333; text-decoration: underline; }
        .footer-copy { font-size: 12px; color: #aaa; margin: 0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">KANKETSU</div>
        <a href="login.html" class="btn-author-login">作者ログイン / 登録</a>
    </div>

    <div class="container">
        <div class="hero">
            <h1>大好きな作者を直接応援しよう</h1>
            <p>会員登録は不要です。<br>活動サイトのマイページURLを入力して、作者の支援ページへ移動します。</p>
        </div>

        <div class="search-card">
            <h2>🔍 URLで支援ページを開く</h2>
            <p style="font-size: 13px; color: #666; margin-bottom: 15px;">支援したい作者の「活動サイトのマイページURL」を正確に入力してください。</p>
            <input type="url" id="searchUrl" class="search-input" placeholder="例: https://syosetu.com/user/xxxx/">
            <button class="btn-search" onclick="searchAuthor()">検索する</button>
            
            <div id="searchResult"></div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-links">
            <a href="tokushoho.html">特定商取引法に基づく表記</a>
            <a href="terms.html">利用規約</a>
            <a href="privacy.html">プライバシーポリシー</a>
        </div>
        <p class="footer-copy">&copy; 2026 KANKETSU</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function searchAuthor() {
            const url = document.getElementById('searchUrl').value.trim();
            const resultDiv = document.getElementById('searchResult');
            
            if (!url) {
                resultDiv.innerHTML = '<p style="color: #d32f2f; font-weight: bold;">URLを入力してください。</p>';
                return;
            }

            resultDiv.innerHTML = '<p>検索中...</p>';

            try {
                const { data, error } = await supabaseClient
                    .from('creators')
                    .select('id, pen_name')
                    .ilike('profile_url', `%${url}%`)
                    .limit(1);

                if (error) throw error;

                if (!data || data.length === 0) {
                    resultDiv.innerHTML = '<p style="color: #d32f2f; font-weight: bold;">見つかりませんでした。URLが間違っていないか確認してください。</p>';
                } else {
                    const author = data[0];
                    resultDiv.innerHTML = `
                        <div style="background: #e3f2fd; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #bbdefb;">
                            <h3 style="margin: 0 0 10px 0; color: #1565c0;">${author.pen_name}</h3>
                            <p style="font-size: 14px; color: #333; margin-bottom: 10px;">作者の支援ページが見つかりました！</p>
                            <a href="profile.html?id=${author.id}" class="btn-link">支援ページへ移動する</a>
                        </div>
                    `;
                }
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = `<p style="color: #d32f2f; font-weight: bold;">システムエラーが発生しました: ${err.message}</p>`;
            }
        }
    </script>
</body>
</html>
