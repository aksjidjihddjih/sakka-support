<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - KANKETSU</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #f9fafb; --card-bg: #ffffff; --text-main: #000000; --text-sub: #4b5563;
            --border-color: #000000; --border-light: #e5e7eb; --border-width: 1.5px;
            --btn-bg: #000000; --btn-text: #ffffff; --btn-hover: #374151;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; line-height: 1.6; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100vh; }
        
        .header { display: flex; justify-content: center; align-items: center; padding: 32px 20px; width: 100%; box-sizing: border-box; }
        .brand-logo { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); text-decoration: none; }
        
        .container { max-width: 600px; margin: 0 auto 40px auto; padding: 0 20px; flex: 1; width: 100%; box-sizing: border-box; }
        
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-sub); text-decoration: none; font-size: 14px; font-weight: 700; margin-bottom: 24px; transition: color 0.2s; cursor: pointer; }
        .back-link:hover { color: var(--text-main); }

        .card { background-color: var(--card-bg); border: var(--border-width) solid var(--border-color); border-radius: 12px; padding: 32px; box-shadow: 2px 2px 0px rgba(0,0,0,1); }
        .card h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px 0; }
        .card p.desc { font-size: 14px; color: var(--text-sub); margin-bottom: 32px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
        .form-control { width: 100%; padding: 12px 16px; font-size: 15px; border: 1px solid var(--border-light); border-radius: 8px; background-color: #f9fafb; color: var(--text-main); box-sizing: border-box; transition: all 0.2s; outline: none; }
        .form-control:focus { border-color: var(--border-color); background-color: #fff; }
        textarea.form-control { resize: vertical; min-height: 150px; }

        .btn { display: inline-flex; justify-content: center; align-items: center; padding: 14px 24px; font-size: 15px; font-weight: 800; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: var(--border-width) solid var(--border-color); box-sizing: border-box; width: 100%; text-decoration: none; }
        .btn-primary { background-color: var(--btn-bg); color: var(--btn-text); }
        .btn-primary:hover { background-color: var(--btn-hover); transform: translate(-1px, -1px); box-shadow: 2px 2px 0px rgba(0,0,0,0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        .site-footer { padding: 40px 20px; text-align: center; border-top: 1px solid var(--border-light); margin-top: auto; }
        
        /* 💡 お知らせ・FAQ誘導バナーのスタイル */
        .faq-banner { background-color: #f3f4f6; border: 1px solid var(--border-light); border-radius: 8px; padding: 16px; margin-bottom: 24px; font-size: 13px; line-height: 1.5; color: var(--text-sub); }
        .faq-banner a { color: var(--text-main); font-weight: 700; text-decoration: underline; }
        
        @media (max-width: 768px) {
            .site-footer { font-size: 10px !important; padding-left: 5px; padding-right: 5px; }
            .site-footer a { font-size: 10px !important; white-space: nowrap; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="brand-logo">KANKETSU</a>
    </div>

    <div class="container">
        <a onclick="history.back()" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            戻る
        </a>

        <div class="card">
            <h1>お問い合わせ</h1>
            <p class="desc">システムに関するご質問や不具合等は、以下のフォームよりお送りください。</p>
            
            <div class="faq-banner">
                <strong>【送信される前にご確認ください】</strong><br>
                多くのお問い合わせについては、<a href="about.html">ご利用ガイド ＆ よくある質問 (FAQ)</a> にて解決方法をご案内しております。お問い合わせの前に、ぜひ一度ご確認ください。
            </div>

            <div class="form-group">
                <label>返信用メールアドレス <span style="color: #dc2626;">*</span></label>
                <input type="email" id="inquiryEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label>お問い合わせの種類 <span style="color: #dc2626;">*</span></label>
                <!-- お問い合わせの種類の <select> の中身を差し替え -->
        <select id="inquiryType" class="form-control" required>
            <option value="" disabled selected>選択してください</option>
            <option value="使い方について">使い方について</option>
            <option value="決済・返金について">決済・返金について</option>
            <option value="なりすまし・不正の報告">なりすまし・不正の報告</option>
            <option value="不具合の報告">不具合の報告</option>
            <option value="その他">その他</option>
        </select>
            </div>
            
            <div class="form-group">
                <label>お問い合わせ内容 <span style="color: #dc2626;">*</span></label>
                <textarea id="inquiryMessage" class="form-control" placeholder="できるだけ詳細にご記入ください。" required></textarea>
            </div>
            
            <div style="margin-bottom: 24px; display: flex; justify-content: center;">
                <div class="cf-turnstile" 
                     data-sitekey="0x4AAAAAADpftKeLBvaOQqcA" 
                     data-callback="onTurnstileVerify"
                     data-expired-callback="onTurnstileExpire"></div>
            </div>

            <button id="submitBtn" class="btn btn-primary" onclick="submitReaderInquiry()" disabled>送信する</button>
        </div>
    </div>

    <div class="site-footer">
        <div style="margin-bottom: 12px; display: flex; justify-content: center; flex-wrap: wrap; gap: 16px;">
            <a href="tokushoho.html" style="color: var(--text-sub); text-decoration: none; font-weight: 600; font-size: 13px;" onmouseover="this.style.color='var(--text-main)';" onmouseout="this.style.color='var(--text-sub)';">特定商取引法に基づく表記</a>
            <a href="terms.html" style="color: var(--text-sub); text-decoration: none; font-weight: 600; font-size: 13px;" onmouseover="this.style.color='var(--text-main)';" onmouseout="this.style.color='var(--text-sub)';">利用規約</a>
            <a href="privacy.html" style="color: var(--text-sub); text-decoration: none; font-weight: 600; font-size: 13px;" onmouseover="this.style.color='var(--text-main)';" onmouseout="this.style.color='var(--text-sub)';">プライバシーポリシー</a>
            <a href="about.html" style="color: var(--text-sub); text-decoration: none; font-weight: 600; font-size: 13px;" onmouseover="this.style.color='var(--text-main)';" onmouseout="this.style.color='var(--text-sub)';">お問い合わせ</a>
        </div>
        <p style="margin: 0; color: var(--text-sub); font-size: 13px;">&copy; 2026 KANKETSU</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 💡 BOT判定ロジック
        let turnstileToken = null;
        window.onTurnstileVerify = function(token) {
            turnstileToken = token;
            document.getElementById('submitBtn').disabled = false;
        };
        window.onTurnstileExpire = function() {
            turnstileToken = null;
            document.getElementById('submitBtn').disabled = true;
        };

        async function submitReaderInquiry() {
            const emailInput = document.getElementById('inquiryEmail');
            const typeSelect = document.getElementById('inquiryType');
            const messageInput = document.getElementById('inquiryMessage');
            const btn = document.getElementById('submitBtn');

            const email = emailInput.value.trim();
            const type = typeSelect.value;
            const message = messageInput.value.trim();

            if (!email || !message) {
                return alert('返信用メールアドレスと内容を入力してください。');
            }
            if (!turnstileToken) {
                return alert('セキュリティ認証が完了していません。');
            }

            btn.disabled = true;
            btn.innerText = '送信中...';

            try {
                // 読者はログインしていないため、user_id は記録しません（空になります）
                const { error } = await supabaseClient.from('inquiries').insert([{
                    email: email,
                    inquiry_type: type,
                    message: message
                }]);

                if (error) throw error;

                <div id="successMessage" style="display: none; background-color: var(--card-bg, #ffffff); border: 2px solid var(--border-color, #000000); border-radius: 12px; padding: 32px; text-align: center; box-shadow: 4px 4px 0px rgba(0,0,0,1);">
            <div style="width: 48px; height: 48px; background: #16a34a; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <h3 style="margin: 0 0 16px 0; font-size: 20px; font-weight: 800; color: var(--text-main, #000000);">送信が完了しました</h3>
            <p style="font-size: 14px; color: var(--text-sub, #4b5563); margin-bottom: 24px; line-height: 1.6;">
                ご返信まで通常3〜5営業日いただいております。<br>
                返信はご入力のメールアドレスへお送りします。
            </p>
            <div style="background: #f9fafb; border: 1px solid var(--border-light, #e5e7eb); border-radius: 8px; padding: 16px; text-align: left; font-size: 12px; color: var(--text-sub, #4b5563);">
                <strong style="color: var(--text-main, #000000); display: block; margin-bottom: 4px;">【決済・返金についてお問い合わせいただいた方へ】</strong>
                お問い合わせの調査には決済記録の確認が必要なため、通常よりお時間をいただく場合がございます。あらかじめご了承ください。
            </div>
        </div>
                
                // 送信後は内容だけクリアして連続送信を防ぐ
                messageInput.value = '';
                if (window.turnstile) turnstile.reset();
                turnstileToken = null;
                document.getElementById('submitBtn').disabled = true;

            } catch (error) {
                alert('送信に失敗しました。時間をおいて再度お試しください。\n' + error.message);
                btn.disabled = false;
                btn.innerText = '送信する';
            }
        }
    </script>
</body>
</html>
