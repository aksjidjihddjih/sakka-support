<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クリエイターを支援する - KANKETSU</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        :root {
            --bg-color: #f9fafb; --card-bg: #ffffff; --text-main: #000000; --text-sub: #4b5563;
            --border-color: #000000; --border-light: #e5e7eb; --border-width: 1.5px;
            --btn-bg: #000000; --btn-text: #ffffff; --btn-hover: #374151;
            --accent-color: #2563eb;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .avatar { width: 80px; height: 80px; background-color: var(--text-main); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 32px; margin: 0 auto 16px auto; }
        .creator-name { font-size: 24px; font-weight: 800; margin: 0 0 8px 0; }
        
        .card { background-color: var(--card-bg); border: var(--border-width) solid var(--border-color); border-radius: 12px; padding: 32px; margin-bottom: 24px; box-shadow: 2px 2px 0px rgba(0,0,0,1); }
        .section-title { font-size: 16px; font-weight: 700; margin: 0 0 16px 0; border-bottom: 1px solid var(--border-light); padding-bottom: 8px; }

        /* リンク一覧 */
        .link-list { display: flex; flex-direction: column; gap: 12px; }
        .link-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border: 1px solid var(--border-light); border-radius: 8px; text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .link-item:hover { border-color: var(--border-color); transform: translate(-1px, -1px); box-shadow: 2px 2px 0px rgba(0,0,0,0.1); }

        /* 作品選択（ラジオボタンをカード風に） */
        .work-options { display: flex; flex-direction: column; gap: 12px; }
        .work-option { position: relative; }
        .work-option input[type="radio"] { position: absolute; opacity: 0; }
        .work-label { display: block; padding: 16px; border: 1px solid var(--border-light); border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .work-label-title { font-size: 15px; font-weight: 600; display: block; margin-bottom: 4px; }
        .work-label-desc { font-size: 13px; color: var(--text-sub); display: block; }
        
        /* 選択時のスタイル */
        .work-option input[type="radio"]:checked + .work-label { border: 2px solid var(--border-color); background-color: #f9fafb; box-shadow: 2px 2px 0px rgba(0,0,0,1); }

        /* 金額入力 */
        .amount-input-wrapper { display: flex; align-items: center; border: 2px solid var(--border-color); border-radius: 8px; padding: 12px 16px; font-size: 24px; font-weight: 700; background: #fff; }
        .amount-input-wrapper span { margin-right: 8px; color: var(--text-sub); }
        .amount-input { border: none; outline: none; font-size: 24px; font-weight: 700; width: 100%; color: var(--text-main); }

        .btn { display: inline-flex; justify-content: center; align-items: center; width: 100%; padding: 16px 24px; font-size: 16px; font-weight: 800; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: var(--border-width) solid var(--border-color); box-sizing: border-box; margin-top: 24px; }
        .btn-primary { background-color: var(--btn-bg); color: var(--btn-text); }
        .btn-primary:hover { background-color: var(--btn-hover); transform: translate(-1px, -1px); box-shadow: 2px 2px 0px rgba(0,0,0,0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        #loadingState { text-align: center; padding: 40px; color: var(--text-sub); }
        #errorState { display: none; text-align: center; color: #dc2626; padding: 40px; }
        #mainContent { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loadingState">クリエイター情報を読み込み中...</div>
        
        <div id="errorState">
            <h2>エラーが発生しました</h2>
            <p id="errorMessage">クリエイター情報が見つかりません。</p>
        </div>

        <div id="mainContent">
            <div class="header">
                <div class="avatar" id="authorAvatar"></div>
                <h1 class="creator-name" id="authorName"></h1>
                <p style="color: var(--text-sub); margin: 0; font-size: 14px;">このクリエイターの創作活動を支援します</p>
            </div>

            <div class="card" id="linksCard" style="display: none;">
                <h2 class="section-title">活動サイト</h2>
                <div class="link-list" id="linksList">
                    </div>
            </div>

            <div class="card">
                <h2 class="section-title">1. 支援する作品を選ぶ</h2>
                <div class="work-options" id="worksList">
                    <div class="work-option">
                        <input type="radio" name="selectedWork" id="work_general" value="general" checked>
                        <label for="work_general" class="work-label">
                            <span class="work-label-title">全体への支援（作品指定なし）</span>
                            <span class="work-label-desc">活動全般に対する応援として支援します。</span>
                        </label>
                    </div>
                    </div>

                <h2 class="section-title" style="margin-top: 32px;">2. 支援金額を入力する</h2>
                <div class="amount-input-wrapper">
                    <span>¥</span>
                    <input type="number" id="amountInput" class="amount-input" value="500" min="100" max="10000" step="100">
                </div>

                <button class="btn btn-primary" id="checkoutBtn" onclick="processCheckout()">
                    クレジットカードで支援する
                </button>
            </div>
            
            <p style="text-align: center; font-size: 12px; color: var(--text-sub);">決済はStripeを通じて安全に処理されます。</p>
        </div>
    </div>

    <script>
        // ==========================================
        // 【重要】ご自身のSupabaseのURLとキーに変更してください
        // ==========================================
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        // ==========================================
        // 【重要】Stripeの公開可能キー(pk_test_...)に変更してください
        // ==========================================
        const STRIPE_PUBLIC_KEY = 'pk_test_51ThTKj4XyICGMkd9IU5z99hggK13SiHHFZMffu6rMnMTtNiQ6TNzNeBxhqD7ah8wTed7GATw83rNiJgohFUhuwOg00I0j4UOOM';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const stripe = Stripe(STRIPE_PUBLIC_KEY);

        let authorId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // URLから作者のID（?id=xxxx）を取得
            const params = new URLSearchParams(window.location.search);
            authorId = params.get('id');

            if (!authorId) {
                showError("URLが正しくありません。作者のIDが含まれていません。");
                return;
            }

            try {
                // 1. 作者情報の取得
                const { data: creator, error: creatorError } = await supabase
                    .from('creators').select('*').eq('id', authorId).single();
                
                if (creatorError || !creator) throw new Error("クリエイター情報が見つかりません。");

                const penname = creator.penname || "名無し作者";
                document.getElementById('authorName').innerText = penname;
                document.getElementById('authorAvatar').innerText = penname.charAt(0);

                // 2. 活動サイトリンクの取得
                const { data: links } = await supabase
                    .from('creator_links').select('*').eq('creator_id', authorId).order('created_at');
                
                if (links && links.length > 0) {
                    const linksList = document.getElementById('linksList');
                    links.forEach(link => {
                        linksList.innerHTML += `
                            <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="link-item">
                                ${link.title}
                                <svg class="icon icon-sm" viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                            </a>
                        `;
                    });
                    document.getElementById('linksCard').style.display = 'block';
                }

                // 3. 作品一覧の取得
                const { data: works } = await supabase
                    .from('works').select('*').eq('creator_id', authorId).order('created_at');
                
                if (works && works.length > 0) {
                    const worksList = document.getElementById('worksList');
                    works.forEach(work => {
                        worksList.innerHTML += `
                            <div class="work-option">
                                <input type="radio" name="selectedWork" id="work_${work.id}" value="${work.id}">
                                <label for="work_${work.id}" class="work-label">
                                    <span class="work-label-title">${work.title}</span>
                                    <span class="work-label-desc">この作品を指定して応援します。</span>
                                </label>
                            </div>
                        `;
                    });
                }

                // ローディングを隠してメイン画面を表示
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';

            } catch (error) {
                showError(error.message);
            }
        });

        function showError(msg) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').innerText = msg;
        }

        // 決済処理へ進む
        async function processCheckout() {
            const btn = document.getElementById('checkoutBtn');
            const amount = parseInt(document.getElementById('amountInput').value, 10);
            
            // 選択された作品ID（または general）を取得
            const selectedWork = document.querySelector('input[name="selectedWork"]:checked').value;

            if (isNaN(amount) || amount < 100) {
                alert('支援金額は100円以上で入力してください。');
                return;
            }

            btn.disabled = true;
            btn.innerText = '決済画面へ移動中...';

            try {
                // 【注意】Edge FunctionのURLを自分のプロジェクトのものに書き換えてください
                const response = await fetch('https://cfeejhwshvluyecqvgjd.supabase.co/functions/v1/create-checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        amount: amount, 
                        authorId: authorId,
                        workId: selectedWork // 作品IDをStripeへ渡す
                    })
                });

                const session = await response.json();
                if (session.error) throw new Error(session.error);

                // Stripeの決済画面へリダイレクト
                const { error } = await stripe.redirectToCheckout({ sessionId: session.id });
                if (error) throw error;

            } catch (error) {
                alert("エラーが発生しました: " + error.message);
                btn.disabled = false;
                btn.innerText = 'クレジットカードで支援する';
            }
        }
    </script>
</body>
</html>
