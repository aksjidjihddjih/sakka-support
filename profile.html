<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クリエイターを支援する - KANKETSU</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root {
            --bg-color: #f9fafb; --card-bg: #ffffff; --text-main: #000000; --text-sub: #4b5563;
            --border-color: #000000; --border-light: #e5e7eb; --border-width: 1.5px;
            --btn-bg: #000000; --btn-text: #ffffff; --btn-hover: #374151;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        
        /* ★ コンテナの上部余白を 40px から 80px に増やして全体を下に下げました */
        .container { max-width: 600px; margin: 80px auto 40px auto; padding: 0 20px; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .avatar { width: 80px; height: 80px; background-color: var(--text-main); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 32px; margin: 0 auto 16px auto; }
        .creator-name { font-size: 24px; font-weight: 800; margin: 0 0 8px 0; }
        
        .card { background-color: var(--card-bg); border: var(--border-width) solid var(--border-color); border-radius: 12px; padding: 32px; margin-bottom: 24px; box-shadow: 2px 2px 0px rgba(0,0,0,1); }
        .section-title { font-size: 16px; font-weight: 700; margin: 0 0 16px 0; border-bottom: 1px solid var(--border-light); padding-bottom: 8px; }

        .link-list { display: flex; flex-direction: column; gap: 12px; }
        .link-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border: 1px solid var(--border-light); border-radius: 8px; text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .link-item:hover { border-color: var(--border-color); transform: translate(-1px, -1px); box-shadow: 2px 2px 0px rgba(0,0,0,0.1); }

        .work-options { display: flex; flex-direction: column; gap: 12px; }
        .work-option { position: relative; }
        .work-option input[type="radio"] { position: absolute; opacity: 0; }
        .work-label { display: block; padding: 16px; border: 2px solid var(--border-light); border-radius: 8px; cursor: pointer; transition: background-color 0.2s, border-color 0.2s; box-sizing: border-box; }
        .work-label-title { font-size: 15px; font-weight: 600; display: block; margin-bottom: 4px; }
        .work-label-desc { font-size: 13px; color: var(--text-sub); display: block; }
        .work-option input[type="radio"]:checked + .work-label { border-color: var(--border-color); background-color: #f9fafb; }
        
        .amount-input { border: none; outline: none; font-size: 24px; font-weight: 700; width: 100%; color: var(--text-main); background: transparent; }
        .amount-input::placeholder { color: #9ca3af; font-weight: 600; }

        .btn { display: inline-flex; justify-content: center; align-items: center; width: 100%; padding: 16px 24px; font-size: 16px; font-weight: 800; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: var(--border-width) solid var(--border-color); box-sizing: border-box; margin-top: 8px; text-decoration: none;}
        .btn-primary { background-color: var(--btn-bg); color: var(--btn-text); }
        .btn-primary:hover { background-color: var(--btn-hover); transform: translate(-1px, -1px); box-shadow: 2px 2px 0px rgba(0,0,0,0.2); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        #loadingState { text-align: center; padding: 40px; color: var(--text-sub); font-weight: 600; }
        #errorState { display: none; background: #fee2e2; border: 2px solid #ef4444; border-radius: 8px; padding: 24px; margin: 40px 0; text-align: center; }
        #errorState h2 { color: #b91c1c; margin-top: 0; font-size: 18px; }
        #mainContent { display: none; }
        
        @media (max-width: 768px) {
            .site-footer { font-size: 10px !important; padding-left: 5px; padding-right: 5px; }
            .site-footer a { font-size: 10px !important; white-space: nowrap; }
            /* スマホの時は上の余白を少し縮める */
            .container { margin-top: 60px; }
        }
    </style>
</head>
<body>
    <div style="position: absolute; top: 0; left: 0; right: 0; padding: 16px 20px; display: flex; justify-content: flex-end; box-sizing: border-box;">
        <a href="signup.html" class="btn btn-primary" style="width: auto; padding: 8px 16px; font-size: 12px; font-weight: 700; border-radius: 20px; margin-top: 0;">作家として登録</a>
    </div>

    <div class="container">
        <div id="loadingState">クリエイター情報を読み込み中...</div>
        <div id="errorState"><h2>読み込みエラー</h2><p id="errorMessage"></p></div>

        <div id="mainContent">
            <div class="header">
                <h1 class="creator-name" id="authorName" style="font-size: 28px;">読み込み中...</h1>
                <p style="color: var(--text-sub); margin: 0; font-size: 14px;">このクリエイターの創作活動を支援します</p>
            </div>

            <div class="card" id="linksCard" style="display: none;">
                <h2 class="section-title">活動サイト</h2>
                <div class="link-list" id="linksList"></div>
            </div>

            <div class="card">
                <h2 class="section-title" style="border-bottom: none; padding-bottom: 0; margin-bottom: 12px;">1. 支援する作品を選ぶ</h2>
                
                <div style="position: relative; margin-bottom: 16px;">
                    <svg style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-sub);" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="workSearchInput" style="width: 100%; padding: 12px 16px 12px 36px; border: 1px solid var(--border-light); border-radius: 8px; box-sizing: border-box; font-size: 14px; background-color: #f9fafb; transition: all 0.2s; outline: none;" placeholder="作品名で検索..." onfocus="this.style.borderColor='var(--border-color)'; this.style.backgroundColor='#fff';" onblur="this.style.borderColor='var(--border-light)'; this.style.backgroundColor='#f9fafb';">
                </div>

                <div class="work-options" id="worksList" style="max-height: 300px; overflow-y: auto; padding-right: 4px;">
                    <div class="work-option search-target" data-title="全体への支援（作品指定なし）">
                        <input type="radio" name="selectedWork" id="work_general" value="general" checked>
                        <label for="work_general" class="work-label">
                            <span class="work-label-title">全体への支援（作品指定なし）</span>
                            <span class="work-label-desc">活動全般に対する応援として支援します。</span>
                        </label>
                    </div>
                </div>

                <h2 class="section-title" style="margin-top: 32px; border-bottom: none; margin-bottom: 8px;">2. 支援金額を入力する</h2>
                <div style="position: relative; margin-bottom: 8px;">
                    <span style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 20px; font-weight: 700; color: var(--text-main);">¥</span>
                    <input type="number" id="amountInput" class="amount-input" style="padding: 16px 16px 16px 44px; border: 2px solid var(--border-color); border-radius: 8px; width: 100%; box-sizing: border-box; background: #fff;" placeholder="" min="100" max="10000" step="100">
                </div>
                <p style="font-size: 13px; color: var(--text-sub); margin: 0 0 24px 0; text-align: right; font-weight: 600;">※ 100円 〜 10,000円 の範囲で入力</p>

                <button class="btn btn-primary" id="checkoutBtn" onclick="processCheckout()">クレジットカードで支援する</button>
            </div>
        </div>
    </div>
    
    <div style="text-align: center; padding: 40px 20px; border-top: 1px solid var(--border-light); margin-top: 40px;">
        <div class="site-footer" style="margin-bottom: 12px; display: flex; justify-content: center; flex-wrap: wrap; gap: 16px;">
            <a href="tokushoho.html" style="color: var(--text-sub); text-decoration: none; font-weight: 600; font-size: 13px;" onmouseover="this.style.color='var(--text-main)';" onmouseout="this.style.color='var(--text-sub)';">特定商取引法に基づく表記</a>
            <a href="terms.html" style="color: var(--text-sub); text-decoration: none; font-weight: 600; font-size: 13px;" onmouseover="this.style.color='var(--text-main)';" onmouseout="this.style.color='var(--text-sub)';">利用規約</a>
            <a href="privacy.html" style="color: var(--text-sub); text-decoration: none; font-weight: 600; font-size: 13px;" onmouseover="this.style.color='var(--text-main)';" onmouseout="this.style.color='var(--text-sub)';">プライバシーポリシー</a>
            <a href="contact.html" style="color: var(--text-sub); text-decoration: none; font-weight: 600; font-size: 13px;" onmouseover="this.style.color='var(--text-main)';" onmouseout="this.style.color='var(--text-sub)';">お問い合わせ</a>
        </div>
        <p style="margin: 0; color: var(--text-sub); font-size: 13px;">&copy; 2026 KANKETSU</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        const STRIPE_PUBLIC_KEY = 'pk_test_51ThTKj4XyICGMkd9IU5z99hggK13SiHHFZMffu6rMnMTtNiQ6TNzNeBxhqD7ah8wTed7GATw83rNiJgohFUhuwOg00I0j4UOOM';

        let supabaseClient, authorId = null;

        function showError(msg) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').innerHTML = msg;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                authorId = new URLSearchParams(window.location.search).get('id');
                if (!authorId) throw new Error("URLが正しくありません。");

                const { data: creator } = await supabaseClient.from('creators').select('*').eq('id', authorId).single();
                if (!creator) throw new Error("指定されたクリエイターが見つかりません。");

                const penname = creator.pen_name || "名無し作者";
                document.getElementById('authorName').innerText = penname;
               
                const { data: links } = await supabaseClient.from('creator_links').select('*').eq('creator_id', authorId).order('created_at');
                if (links && links.length > 0) {
                    const linksList = document.getElementById('linksList');
                    links.forEach(link => {
                        linksList.innerHTML += `<a href="${link.url}" target="_blank" class="link-item">${link.title} <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg></a>`;
                    });
                    document.getElementById('linksCard').style.display = 'block';
                }

                const { data: works } = await supabaseClient.from('works').select('*').eq('creator_id', authorId).order('created_at');
                if (works && works.length > 0) {
                    const worksList = document.getElementById('worksList');
                    works.forEach(work => {
                        worksList.innerHTML += `
                            <div class="work-option search-target" data-title="${work.title.replace(/"/g, '&quot;')}">
                                <input type="radio" name="selectedWork" id="work_${work.id}" value="${work.id}">
                                <label for="work_${work.id}" class="work-label">
                                    <span class="work-label-title">${work.title}</span>
                                    <span class="work-label-desc">この作品を指定して応援します。</span>
                                </label>
                            </div>`;
                    });

                    const searchInput = document.getElementById('workSearchInput');
                    if(searchInput) {
                        searchInput.addEventListener('input', function(e) {
                            const searchTerm = e.target.value.toLowerCase();
                            const targets = document.querySelectorAll('.search-target');
                            targets.forEach(target => {
                                const title = target.getAttribute('data-title').toLowerCase();
                                if (title.includes(searchTerm)) {
                                    target.style.display = '';
                                } else {
                                    target.style.display = 'none';
                                }
                            });
                        });
                    }
                }
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } catch (error) { showError(error.message); }
        });

        async function processCheckout() {
            const btn = document.getElementById('checkoutBtn');
            const amount = parseInt(document.getElementById('amountInput').value, 10);
            const selectedWork = document.querySelector('input[name="selectedWork"]:checked').value;

            if (isNaN(amount) || amount < 100 || amount > 10000) {
                return alert('100円〜10,000円の範囲で金額を入力してください。');
            }

            try {
                const stripe = Stripe(STRIPE_PUBLIC_KEY);
                btn.disabled = true; btn.innerText = '決済画面へ移動中...';

                const { data: sessionData, error: functionError } = await supabaseClient.functions.invoke('create-checkout', {
                    body: { amount: amount, authorId: authorId, workId: selectedWork }
                });

                if (functionError) throw new Error("通信エラー: " + functionError.message);
                if (sessionData && sessionData.error) throw new Error("決済エラー: " + sessionData.error);

                const checkoutSessionId = sessionData.id || sessionData.sessionId;
                if (!checkoutSessionId) throw new Error("セッションIDが取得できませんでした。");

                const { error } = await stripe.redirectToCheckout({ sessionId: checkoutSessionId });
                if (error) throw error;
            } catch (error) {
                alert("エラーが発生しました:\n" + error.message);
                btn.disabled = false; btn.innerText = 'クレジットカードで支援する';
            }
        }
    </script>
</body>
</html>
