<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作者プロフィール - KANKETSU</title>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f6f8; color: #333; margin: 0; padding: 0; }
        .header { background-color: #333; color: white; padding: 15px 20px; text-align: center; font-weight: bold; letter-spacing: 1px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        
        .profile-card { background-color: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; }
        .author-name { font-size: 24px; font-weight: bold; margin: 0 0 10px 0; color: #1976d2; }
        .profile-link { display: inline-block; background-color: #f5f5f5; padding: 10px 20px; border-radius: 6px; font-size: 14px; color: #1976d2; text-decoration: none; font-weight: bold; border: 1px solid #e0e0e0; transition: 0.2s; }
        .profile-link:hover { background-color: #e3f2fd; border-color: #bbdefb; }
        
        .verification-box { background: #ffebee; border: 2px solid #ef9a9a; border-radius: 8px; padding: 15px; margin-bottom: 25px; }
        .verification-box p.title { margin: 0 0 8px 0; font-size: 15px; font-weight: bold; color: #c62828; }
        .verification-box p.desc { margin: 0 0 12px 0; font-size: 13px; color: #555; line-height: 1.5; }
        .check-label { display: flex; align-items: center; font-size: 14px; font-weight: bold; cursor: pointer; color: #333; }
        .check-label input { width: 18px; height: 18px; margin-right: 8px; cursor: pointer; }

        .section-title { font-size: 18px; font-weight: bold; margin: 30px 0 15px 0; border-left: 4px solid #f57c00; padding-left: 10px; }
        
        .support-box { background: #fff8e1; border: 1px solid #ffe0b2; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .support-box p { margin: 0 0 15px 0; font-size: 15px; line-height: 1.6; color: #555;}
        
        .work-card { background: white; border-radius: 8px; padding: 20px; border: 1px solid #eee; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .work-title { font-size: 18px; font-weight: bold; margin: 0 0 5px 0; }
        .work-url { font-size: 13px; color: #1976d2; margin-bottom: 15px; display: inline-block; text-decoration: none;}
        .work-url:hover { text-decoration: underline; }
        
        /* ★追加：金額入力欄のデザイン */
        .amount-input-wrapper { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 6px; padding: 15px; text-align: center; margin-bottom: 15px; }
        .amount-input-wrapper label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 8px; color: #444; }
        .amount-input { width: 120px; padding: 10px; font-size: 18px; text-align: right; border: 2px solid #ccc; border-radius: 4px; font-weight: bold; }
        .amount-input:focus { border-color: #f57c00; outline: none; }
        
        .btn-support { display: block; width: 100%; background-color: #f57c00; color: white; border: none; padding: 15px 0; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; transition: background 0.2s; box-shadow: 0 4px 6px rgba(245,124,0,0.2); }
        .btn-support:hover { background-color: #e65100; transform: translateY(-1px); }
        .btn-support:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }
        .btn-support span { display: block; font-size: 12px; font-weight: normal; margin-top: 3px; opacity: 0.9; }

        #errorMessage { color: #d32f2f; text-align: center; font-weight: bold; margin-top: 20px; }
        .loading { text-align: center; color: #666; margin-top: 50px; }
        
        .secret-blur { filter: blur(4px); user-select: none; background: #eee; height: 60px; border-radius: 4px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; color: transparent; }
    </style>
</head>
<body>

    <div class="header">KANKETSU</div>

    <div class="container" id="mainContainer" style="display: none;">
        <div class="profile-card">
            <h1 class="author-name" id="authorName"></h1>
            <a href="#" target="_blank" class="profile-link" id="authorUrl">マイページを開いて作者を確認する ↗</a>
        </div>

        <div class="verification-box">
            <p class="title">⚠️ 支援の前に必ずご確認ください</p>
            <p class="desc">上のボタンから活動サイトを開き、作者のマイページや活動報告に<b>「この支援ページのURL」が記載されているか</b>を確認してください。（なりすまし詐欺を防ぐためのお願いです）</p>
            <label class="check-label">
                <input type="checkbox" id="verifyCheck">
                本物の作者の支援ページであることを確認しました
            </label>
        </div>

        <div id="generalSupportArea">
            <h2 class="section-title">作者を支援する</h2>
            <div class="support-box">
                <p>支援の特典として、作者の<strong>「限定メッセージ」</strong>を読むことができます。</p>
                <div class="secret-blur">ここは決済後に読めるようになります</div>
                
                <div class="amount-input-wrapper">
                    <label for="amountGeneral">支援金額（100円〜10,000円）</label>
                    <input type="number" id="amountGeneral" class="amount-input" min="100" max="10000" value="100" step="100"> 円
                </div>

                <button class="btn-support" id="btnGeneral" onclick="startCheckout('general', null)">
                    支援してメッセージを読む
                    <span>※会員登録不要・クレジットカード決済</span>
                </button>
            </div>
        </div>

        <h2 class="section-title" id="worksTitle" style="display: none;">作品を指定して支援する</h2>
        <div id="worksList"></div>
    </div>

    <div id="errorMessage"></div>
    <div id="loading" class="loading">情報を読み込んでいます...</div>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        const STRIPE_PUBLIC_KEY = 'pk_test_51ThTKj4XyICGMkd9IU5z99hggK13SiHHFZMffu6rMnMTtNiQ6TNzNeBxhqD7ah8wTed7GATw83rNiJgohFUhuwOg00I0j4UOOM';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const stripe = Stripe(STRIPE_PUBLIC_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const targetAuthorId = urlParams.get('id');

        window.onload = async function() {
            if (!targetAuthorId) {
                showError('作者IDが指定されていません。トップページから検索してください。');
                return;
            }

            const { data: creator, error: creatorError } = await supabaseClient
                .from('creators').select('*').eq('id', targetAuthorId).single();

            if (creatorError || !creator) {
                showError('作者情報が見つかりませんでした。');
                return;
            }

            document.getElementById('authorName').innerText = creator.pen_name;
            document.getElementById('authorUrl').href = creator.profile_url;

            if (!creator.general_secret_message) {
                document.getElementById('generalSupportArea').style.display = 'none';
            }

            const { data: works, error: worksError } = await supabaseClient
                .from('works').select('*').eq('creator_id', targetAuthorId).order('created_at', { ascending: false });

            if (!worksError && works.length > 0) {
                document.getElementById('worksTitle').style.display = 'block';
                const worksList = document.getElementById('worksList');
                let html = '';
                
                works.forEach(work => {
                    html += `
                        <div class="work-card">
                            <h3 class="work-title">${work.title}</h3>
                            <a href="${work.work_url}" target="_blank" class="work-url">作品ページを開く ↗</a>
                            <p style="font-size: 14px; color: #555; margin-bottom: 10px;">支援特典：この作品の<strong>限定メッセージ</strong></p>
                            <div class="secret-blur">ここは決済後に読めるようになります</div>
                            
                            <div class="amount-input-wrapper">
                                <label for="amount_${work.id}">支援金額（100円〜10,000円）</label>
                                <input type="number" id="amount_${work.id}" class="amount-input" min="100" max="10000" value="100" step="100"> 円
                            </div>

                            <button class="btn-support" id="btn_${work.id}" onclick="startCheckout('work', '${work.id}')">
                                支援してメッセージを読む
                            </button>
                        </div>
                    `;
                });
                worksList.innerHTML = html;
            }

            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
        };

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorMessage').innerText = msg;
        }

        async function startCheckout(supportType, workId) {
            const isVerified = document.getElementById('verifyCheck').checked;
            if (!isVerified) {
                alert('⚠️ 支援を行う前に、上の「本物の作者の支援ページであることを確認しました」にチェックを入れてください。');
                return;
            }

            // ★追加：入力された金額の取得とバリデーション（画面側でのブロック）
            const inputId = supportType === 'general' ? 'amountGeneral' : `amount_${workId}`;
            const amountInput = document.getElementById(inputId);
            const amount = parseInt(amountInput.value, 10);

            if (isNaN(amount) || amount < 100 || amount > 10000) {
                alert('金額は100円から10,000円の間で入力してください。');
                amountInput.focus();
                return;
            }

            const btnId = supportType === 'general' ? 'btnGeneral' : `btn_${workId}`;
            const btn = document.getElementById(btnId);
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerText = '決済画面へ移動中...';

            try {
                const { data, error } = await supabaseClient.functions.invoke('create-checkout', {
                    body: {
                        authorId: targetAuthorId,
                        type: supportType,
                        workId: workId,
                        amount: amount // ★裏側に金額を渡す
                    }
                });

                if (error) throw error;
                await stripe.redirectToCheckout({ sessionId: data.sessionId });

            } catch (err) {
                console.error(err);
                alert('決済システムの通信エラーが発生しました。');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
