<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支援完了 - KANKETSU</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #f9fafb; --card-bg: #ffffff; --text-main: #000000; --text-sub: #4b5563; --border-color: #000000; --border-light: #e5e7eb; --border-width: 1.5px; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; line-height: 1.6; }
        
        .header { display: flex; justify-content: center; align-items: center; padding: 24px 20px; max-width: 840px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .brand-logo { font-size: 20px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); text-decoration: none; }
        
        .container { max-width: 640px; margin: 40px auto; padding: 0 20px; flex: 1; width: 100%; box-sizing: border-box; text-align: center; }
        
        .success-icon { width: 64px; height: 64px; background: #16a34a; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px auto; }
        
        h1 { font-size: 24px; font-weight: 800; margin: 0 0 8px 0; }
        .desc { font-size: 15px; color: var(--text-sub); margin-bottom: 40px; }

        .message-card { 
            background-color: var(--card-bg); 
            border: 2px solid var(--border-color); 
            border-radius: 12px; 
            padding: 40px 32px; 
            margin-bottom: 24px; 
            box-shadow: 4px 4px 0px rgba(0,0,0,1); 
            text-align: left; 
            position: relative;
            overflow: hidden;
        }

        .msg-header { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 24px; 
        }
        
        .msg-icon { 
            width: 32px; 
            height: 32px; 
            background: #000; 
            color: #fff; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .msg-title-wrap { display: flex; flex-direction: column; }
        .msg-title-en { font-size: 11px; font-weight: 800; letter-spacing: 1px; color: var(--text-sub); line-height: 1; margin-bottom: 4px;}
        .msg-title { font-size: 16px; font-weight: 800; margin: 0; line-height: 1;}

        .msg-content { 
            font-size: 15px; 
            line-height: 1.8; 
            color: var(--text-main); 
            white-space: pre-wrap; 
            background: #f9fafb; 
            border: 1px solid var(--border-light); 
            border-radius: 8px; 
            padding: 24px; 
            position: relative;
        }

        .warning-box { 
            background: transparent; 
            border: 1px dashed #9ca3af; 
            border-radius: 8px; 
            padding: 16px; 
            text-align: left; 
            font-size: 13px; 
            color: var(--text-sub); 
        }
        .warning-box strong { 
            color: #000; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            margin-bottom: 8px;
            font-size: 14px;
        }

        .btn { display: inline-flex; justify-content: center; align-items: center; padding: 12px 24px; font-size: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: var(--border-width) solid var(--border-color); box-sizing: border-box; text-decoration: none; margin-top: 32px; }
        .btn-outline { background-color: transparent; color: var(--text-main); }
        .btn-outline:hover { background-color: #fff; transform: translate(-1px, -1px); box-shadow: 2px 2px 0px rgba(0,0,0,1); }
        
        .footer { padding: 40px 20px; text-align: center; font-size: 13px; color: var(--text-sub); border-top: 1px solid var(--border-light); margin-top: auto;}
        
        @media (max-width: 768px) {
            .container { margin: 24px auto; padding: 0 12px; }
            .message-card { padding: 24px 16px; box-shadow: 2px 2px 0px rgba(0,0,0,1); }
            .msg-header { margin-bottom: 16px; }
            .msg-content { padding: 16px; font-size: 14px; line-height: 1.75; }
            .warning-box { padding: 12px; font-size: 12px; }
            .btn { margin-top: 24px; width: 100%; }

            .footer-links { flex-wrap: nowrap !important; gap: 8px !important; justify-content: center !important; }
            .footer-links a { font-size: 10px !important; white-space: nowrap !important; }
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="brand-logo">KANKETSU</a>
    </div>

    <div class="container">
        <div class="success-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h1>ご支援ありがとうございました</h1>
        <p class="desc">決済が完了し、作者へ応援が届きました。</p>

        <div class="message-card">
            <div class="msg-header">
                <div class="msg-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                </div>
                <div class="msg-title-wrap">
                    <span class="msg-title-en">SECRET MESSAGE</span>
                    <h2 class="msg-title">作者からの限定メッセージ</h2>
                </div>
            </div>
            
            <div id="expireDisplay" style="font-size: 12px; color: #dc2626; font-weight: bold; margin-bottom: 12px; text-align: right; display: none;"></div>

            <div id="secretMessage" class="msg-content">読み込み中...</div>
            
        </div>

        <div class="warning-box">
            <strong>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                取り扱いについてのお願い
            </strong>
            この画面はセキュリティ保護のため、一度閉じると再表示できません。<br>
            スクリーンショット等での保存は可能ですが、SNS等への無断転載はお控えください。
        </div>

        <a href="#" id="btnHome" class="btn btn-outline">プロフィール画面へ戻る</a>
    </div>

    <footer class="footer">
        <div class="footer-links" style="margin-bottom: 12px; display: flex; justify-content: center; flex-wrap: wrap; gap: 16px;">
            <a href="tokushoho.html" style="color: var(--text-sub); text-decoration: none; font-weight: 600;" onmouseover="this.style.color='var(--text-main)';" onmouseout="this.style.color='var(--text-sub)';">特定商取引法に基づく表記</a>
            <a href="terms.html" style="color: var(--text-sub); text-decoration: none; font-weight: 600;" onmouseover="this.style.color='var(--text-main)';" onmouseout="this.style.color='var(--text-sub)';">利用規約</a>
            <a href="privacy.html" style="color: var(--text-sub); text-decoration: none; font-weight: 600;" onmouseover="this.style.color='var(--text-main)';" onmouseout="this.style.color='var(--text-sub)';">プライバシーポリシー</a>
        </div>
        <p style="margin: 0;">&copy; 2026 KANKETSU</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');

        if (sessionId) {
            window.history.replaceState(null, '', window.location.pathname);
        }

        window.onload = async function() {
            if (!sessionId) {
                document.getElementById('secretMessage').innerHTML = '<span style="color: var(--text-sub);">不正なアクセス、または既にメッセージを表示済みです。<br>セキュリティ保護のため、メッセージの再表示はできません。</span>';
                return;
            }

            try {
                const { data, error } = await supabaseClient.functions.invoke('verify-payment', {
                    body: { sessionId: sessionId }
                });

                if (error) {
                    throw new Error(`システム通信エラー: ${error.message}`);
                }
                if (data && data.error) {
                    throw new Error(`データ検証エラー: ${data.error}`);
                }

                document.getElementById('secretMessage').innerText = data.message;
                document.getElementById('btnHome').href = `profile.html?id=${data.authorId}`;

                // 💡 バックエンドから期限（expireDate等）が送られてきた場合のみ表示する処理
                if (data.expireDate) {
                    const display = document.getElementById('expireDisplay');
                    display.innerText = `閲覧可能期限: ${data.expireDate}`;
                    display.style.display = 'block';
                }

            } catch (err) {
                document.getElementById('secretMessage').innerHTML = `
                    <span style="color: #dc2626; font-weight: bold;">
                        ${err.message || 'メッセージの取得に失敗しました。'}
                    </span>
                `;
            }
        };
    </script>
</body>
</html>
