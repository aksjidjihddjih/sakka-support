<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支援完了 - KANKETSU</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f6f8; color: #333; margin: 0; padding: 0; }
        .header { background-color: #333; color: white; padding: 15px 20px; text-align: center; font-weight: bold; letter-spacing: 1px; }
        .container { max-width: 600px; margin: 40px auto; padding: 30px; background-color: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        
        .success-icon { font-size: 54px; color: #4caf50; margin-bottom: 10px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #2e7d32; }
        .description { font-size: 15px; color: #666; margin-bottom: 30px; }
        
        .secret-box { background: #fff8e1; border: 2px solid #ffb300; border-radius: 8px; padding: 25px; text-align: left; }
        .secret-title { font-size: 16px; font-weight: bold; color: #e65100; margin-top: 0; margin-bottom: 15px; border-bottom: 1px dashed #ffb300; padding-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .secret-message { font-size: 15px; line-height: 1.6; color: #333; white-space: pre-wrap; }
        
        .btn-home { display: inline-block; margin-top: 30px; background-color: #333; color: white; padding: 14px 28px; border-radius: 8px; text-decoration: none; font-size: 15px; font-weight: bold; transition: background 0.2s; }
        .btn-home:hover { background-color: #555; }
    </style>
</head>
<body>

    <div class="header">KANKETSU</div>

    <div class="container">
        <div class="success-icon">✔️</div>
        <h1>ご支援ありがとうございました</h1>
        <p class="description">決済が正常に完了し、作者へ応援が届きました。</p>

        <div class="secret-box">
            <div class="secret-title">
                <span>🎁 作者からの限定メッセージ</span>
            </div>
            <div id="secretMessage" class="secret-message">読み込み中...</div>
        </div>

        <a href="#" id="btnHome" class="btn-home">プロフィール画面へ戻る</a>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');

        window.onload = async function() {
            if (!sessionId) {
                document.getElementById('secretMessage').innerText = '不正なアクセスです。決済情報が見つかりません。';
                return;
            }

            try {
                const { data, error } = await supabaseClient.functions.invoke('verify-payment', {
                    body: { sessionId: sessionId }
                });

                if (error) {
                    throw new Error(`システム通信エラー: ${error.message}`);
                }
                if (data && data.error) {
                    throw new Error(`データ検証エラー: ${data.error}`);
                }

                document.getElementById('secretMessage').innerText = data.message;
                document.getElementById('btnHome').href = `profile.html?id=${data.authorId}`;

            } catch (err) {
                // 1回使い切りの制限に引っかかった場合や、エラーが発生した場合の表示
                document.getElementById('secretMessage').innerHTML = `
                    <span style="color: #d32f2f; font-weight: bold;">
                        ${err.message || 'メッセージの取得に失敗しました。'}
                    </span><br><br>
                    <span style="font-size: 13px; color: #666;">
                        ※セキュリティと無断転載防止のため、限定メッセージは一度閉じたりリロードしたりすると再表示できない仕様となっています。
                    </span>
                `;
            }
        };
    </script>
</body>
</html>
