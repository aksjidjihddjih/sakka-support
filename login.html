<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - KANKETSU</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #f9fafb; --card-bg: #ffffff; --text-main: #000000; --text-sub: #4b5563; --border-color: #000000; --border-light: #e5e7eb; --border-width: 1.5px; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; line-height: 1.6; }
        
        .header { display: flex; justify-content: center; align-items: center; padding: 32px 20px; width: 100%; box-sizing: border-box; }
        .brand-logo { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); text-decoration: none; }
        
        .container { max-width: 440px; margin: 0 auto 40px auto; padding: 0 20px; flex: 1; width: 100%; box-sizing: border-box; }
        
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-sub); text-decoration: none; font-size: 14px; font-weight: 700; margin-bottom: 24px; transition: color 0.2s; }
        .back-link:hover { color: var(--text-main); }

        .card { background-color: var(--card-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 40px 32px; }
        .card h1 { font-size: 22px; font-weight: 800; margin: 0 0 8px 0; }
        .card p.desc { font-size: 14px; color: var(--text-sub); margin-bottom: 32px; }

        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
        .form-control { width: 100%; padding: 14px 16px; font-size: 15px; font-weight: 600; border: 2px solid var(--border-light); border-radius: 8px; background-color: #f9fafb; color: var(--text-main); box-sizing: border-box; transition: all 0.2s; outline: none; }
        .form-control:focus { border-color: var(--border-color); background-color: #fff; }
        .form-control::placeholder { color: #9ca3af; font-weight: 500; }

        .btn { display: inline-flex; justify-content: center; align-items: center; width: 100%; padding: 14px 24px; font-size: 15px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; border: 2px solid var(--border-color); box-sizing: border-box; text-decoration: none; }
        .btn-primary { background-color: var(--text-main); color: #fff; }
        .btn-primary:hover { opacity: 0.85; }

        .link-text { display: block; text-align: center; font-size: 13px; font-weight: 600; color: var(--text-sub); margin-top: 24px; text-decoration: underline; cursor: pointer; }
        .link-text:hover { color: var(--text-main); }

        #errorMsg { display: none; background: #fee2e2; color: #dc2626; padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; margin-bottom: 24px; border: 1px solid #fca5a5; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="brand-logo">KANKETSU</a>
    </div>

    <div class="container">
        <a href="auth.html" class="back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            戻る
        </a>

        <div class="card">
            <h1>おかえりなさい</h1>
            <p class="desc">登録したメールアドレスとパスワードを入力してください。</p>

            <div id="errorMsg"></div>

            <div>
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" onkeypress="handleEnter(event)">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" onkeypress="handleEnter(event)">
                </div>
                
                <button type="button" class="btn btn-primary" id="submitBtn" onclick="processLogin()">ログイン</button>
            </div>

            <a href="signup.html" class="link-text">アカウントをお持ちでない場合はこちら</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        // ★ バグの原因だった変数名を「supabaseClient」に変更し、衝突を回避しました
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function handleEnter(e) {
            if (e.key === 'Enter' || e.keyCode === 13) {
                processLogin();
            }
        }

        async function processLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            if (!email || !password) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'メールアドレスとパスワードを入力してください。';
                return;
            }

            btn.disabled = true;
            btn.innerText = 'ログイン中...';
            errorMsg.style.display = 'none';

            try {
                // ★ 修正した変数名を使用
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

                if (error) {
                    throw error;
                }
                
                // 成功したらダッシュボードへ一瞬で遷移
                window.location.href = 'dashboard.html';

            } catch (error) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'メールアドレスまたはパスワードが間違っています。';
                btn.disabled = false;
                btn.innerText = 'ログイン';
            }
        }
    </script>
</body>
</html>
