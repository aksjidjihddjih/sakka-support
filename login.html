<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作者ログイン - KANKETSU</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #f3f4f6; --card-bg: #ffffff; --text-main: #000000; --text-sub: #4b5563;
            --border-color: #000000; --border-light: #e5e7eb; --border-width: 1.5px;
            --btn-bg: #000000; --btn-text: #ffffff; --btn-hover: #374151;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; }
        
        .brand-logo { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: var(--text-main); text-decoration: none; margin-bottom: 32px; }
        
        .card { background-color: var(--card-bg); border: var(--border-width) solid var(--border-color); border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 2px 2px 0px rgba(0,0,0,1); box-sizing: border-box; }
        .card h1 { font-size: 20px; margin: 0 0 24px 0; text-align: center; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .form-control { width: 100%; padding: 12px 16px; font-size: 15px; border: 1px solid var(--border-light); border-radius: 8px; box-sizing: border-box; transition: all 0.2s; }
        .form-control:focus { outline: none; border-color: var(--border-color); box-shadow: 0 0 0 1px var(--border-color); }

        .btn { display: flex; justify-content: center; align-items: center; width: 100%; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.2s; border: var(--border-width) solid var(--border-color); box-sizing: border-box; margin-bottom: 12px; }
        .btn-primary { background-color: var(--btn-bg); color: var(--btn-text); }
        .btn-primary:hover { background-color: var(--btn-hover); transform: translate(-1px, -1px); box-shadow: 2px 2px 0px rgba(0,0,0,0.2); }
        .btn-outline { background-color: transparent; color: var(--text-main); }
        .btn-outline:hover { background-color: var(--bg-color); }

        #message { text-align: center; font-size: 13px; font-weight: 600; margin-top: 16px; line-height: 1.5; }
        .error { color: #dc2626; }
        .success { color: #16a34a; }
    </style>
</head>
<body>
    <a href="index.html" class="brand-logo">KANKETSU</a>
    <div class="card">
        <h1>ログイン / 新規登録</h1>
        <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" id="email" class="form-control" placeholder="example@email.com">
        </div>
        <div class="form-group">
            <label>パスワード（8文字以上）</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="handleLogin()">ログイン</button>
        <button class="btn btn-outline" onclick="handleSignUp()">新しく登録する</button>
        <div id="message"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showMsg(text, isError) {
            const m = document.getElementById('message');
            m.innerHTML = text; m.className = isError ? 'error' : 'success';
        }

        async function handleSignUp() {
            const email = document.getElementById('email').value, password = document.getElementById('password').value;
            if (!email || password.length < 8) return showMsg('有効なメールアドレスと8文字以上のパスワードが必要です。', true);
            showMsg('登録中...', false);
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) showMsg(`エラー: ${error.message}`, true);
            else showMsg('登録完了！確認メールを送信しました。', false);
        }

        async function handleLogin() {
            const email = document.getElementById('email').value, password = document.getElementById('password').value;
            if (!email || !password) return showMsg('入力してください。', true);
            showMsg('ログイン中...', false);
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) showMsg(`エラー: ${error.message}`, true);
            else { showMsg('成功！移動します...', false); setTimeout(() => window.location.href = 'dashboard.html', 1000); }
        }
    </script>
</body>
</html>
