<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作者ログイン - KANKETSU</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f6f8; color: #333; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .header { background-color: #333; color: white; padding: 15px 20px; text-align: center; font-weight: bold; letter-spacing: 1px; }
        .container { max-width: 400px; margin: 50px auto; padding: 30px; background-color: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        h1 { text-align: center; color: #1976d2; font-size: 22px; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .form-group input:focus { border-color: #1976d2; outline: none; }
        
        .btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .btn-login { background-color: #1976d2; color: white; }
        .btn-login:hover { background-color: #1565c0; }
        .btn-signup { background-color: white; color: #1976d2; border: 2px solid #1976d2; }
        .btn-signup:hover { background-color: #e3f2fd; }

        #message { text-align: center; font-size: 14px; font-weight: bold; margin-top: 15px; line-height: 1.5; }
        .error { color: #d32f2f; }
        .success { color: #2e7d32; }
        
        .info-box { background-color: #e3f2fd; padding: 15px; border-radius: 6px; font-size: 13px; color: #1565c0; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">KANKETSU - クリエイター管理システム</div>

    <div class="container">
        <h1>作者ログイン / 新規登録</h1>
        
        <div class="info-box">
            セキュリティ保護のため、登録には有効なメールアドレスが必要です。
        </div>
        
        <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" placeholder="example@email.com">
        </div>
        
        <div class="form-group">
            <label for="password">パスワード（8文字以上の英数字）</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn btn-login" onclick="handleLogin()">ログイン</button>
        <button class="btn btn-signup" onclick="handleSignUp()">新しく作者として登録する</button>

        <div id="message"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const messageDiv = document.getElementById('message');

        function showMessage(text, isError = false) {
            messageDiv.innerHTML = text; // HTMLタグを許容するためinnerHTMLに変更
            messageDiv.className = isError ? 'error' : 'success';
        }

        async function handleSignUp() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || password.length < 8) {
                showMessage('有効なメールアドレスと、8文字以上のパスワードを入力してください。', true);
                return;
            }

            showMessage('登録処理中...', false);
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
            });

            if (error) {
                showMessage(`登録エラー: ${error.message}`, true);
            } else {
                // Confirm email がONの場合の案内
                showMessage('✅ 仮登録が完了しました。<br>入力したメールアドレスに確認メールを送信しましたので、メール内のリンクをクリックして登録を完了させてください。', false);
                emailInput.value = '';
                passwordInput.value = '';
            }
        }

        async function handleLogin() {
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showMessage('メールアドレスとパスワードを入力してください。', true);
                return;
            }

            showMessage('ログイン中...', false);
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                if (error.message.includes('Email not confirmed')) {
                    showMessage('ログイン失敗: メールアドレスの認証が完了していません。受信トレイを確認してください。', true);
                } else {
                    showMessage(`ログイン失敗: ${error.message} (パスワードが間違っている可能性があります)`, true);
                }
            } else {
                showMessage('ログイン成功！管理画面へ移動します...', false);
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            }
        }
    </script>
</body>
</html>
