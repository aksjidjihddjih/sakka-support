<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支援履歴・売上明細 - KANKETSU</title>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.4/dist/turbo.es2017-esm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* 全ファイル共通のKANKETSUデザインシステム */
        :root { --bg-color: #f3f4f6; --card-bg: #ffffff; --text-main: #000000; --text-sub: #4b5563; --border-color: #000000; --border-light: #e5e7eb; --border-width: 1.5px; --btn-bg: #000000; --btn-text: #ffffff; --btn-hover: #374151; --sidebar-bg: #000000; --sidebar-text: #d1d5db; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        .icon { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; display: inline-block; vertical-align: middle; }
        .app-container { display: flex; min-height: 100vh; flex-direction: column; }
        .mobile-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--sidebar-bg); color: #fff; position: sticky; top: 0; z-index: 20; }
        .hamburger { background: transparent; border: none; color: #fff; cursor: pointer; padding: 4px; }
        .sidebar { background-color: var(--sidebar-bg); color: var(--sidebar-text); width: 260px; height: 100vh; padding: 32px 0 24px 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; z-index: 30; transform: translateX(-100%); transition: transform 0.3s ease; box-sizing: border-box; }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 25; display: none; opacity: 0; transition: opacity 0.3s; }
        .sidebar-overlay.show { display: block; opacity: 1; }
        .brand-logo { font-size: 20px; font-weight: 800; letter-spacing: 1px; color: #fff; text-decoration: none; padding: 0 24px; margin-bottom: 40px; display: block;}
        .sidebar-nav { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding: 0 12px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--sidebar-text); text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 8px; transition: all 0.2s; cursor: pointer; border: none; background: transparent; text-align: left; width: 100%; box-sizing: border-box; }
        .nav-item:hover, .nav-item.active { background-color: #1f2937; color: #fff; }
        .nav-divider { height: 1px; background-color: #374151; margin: 12px 16px; }
        @media (min-width: 768px) { .app-container { flex-direction: row; } .mobile-header { display: none; } .sidebar { position: sticky; transform: translateX(0); } }
        
        /* メイン・カード */
        .main-content { flex: 1; padding: 32px 20px; max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; display: flex; flex-direction: column; }
        @media (min-width: 768px) { .main-content { padding: 48px; } }
        .card { background-color: var(--card-bg); border: var(--border-width) solid var(--border-color); border-radius: 12px; padding: 24px; margin-bottom: 32px; box-shadow: 2px 2px 0px rgba(0,0,0,1); }
        .card-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-light); }
        .card-title { font-size: 18px; font-weight: 700; margin: 0; }
        
        /* テーブルスタイル */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { padding: 12px; border-bottom: 2px solid var(--border-color); font-weight: 700; color: var(--text-main); }
        td { padding: 16px 12px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
        
        /* ステータスバッジ */
        .badge { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; border: 1px solid var(--border-color); }
        .badge-success { background-color: #e6f4ea; color: #137333; border-color: #34a853; }
        .badge-warning { background-color: #fef7e0; color: #b06000; border-color: #fbbc04; }
        
        /* プラス・マイナス表記の色 */
        .amount-plus { color: var(--text-main); font-weight: 700; }
        .amount-minus { color: #dc2626; font-weight: 700; }

        .account-wrapper { padding: 0 12px; margin-top: auto; }
        .account-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 16px; background: transparent; border: none; color: var(--sidebar-text); text-align: left; font-size: 14px; font-weight: 600; }
        .site-footer { margin-top: auto; padding-top: 48px; border-top: 1px solid var(--border-light); text-align: center; color: var(--text-sub); font-size: 13px; }
    </style>
</head>
<body>

    <div class="app-container" id="sales-container">
        
        <header class="mobile-header">
            <a href="dashboard.html" class="brand-logo" style="color:#fff; text-decoration:none;">KANKETSU</a>
            <button class="hamburger" onclick="window.toggleSidebar()"><svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay" onclick="window.toggleSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <a href="dashboard.html" class="brand-logo">KANKETSU</a>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> ホーム
                </a>
                <a href="notice.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg> お知らせ
                </a>
                <a href="sales.html" class="nav-item active">
                    <svg class="icon" viewBox="0 0 24 24"><line x1="12" y1="9" x2="12" y2="22"></line><polyline points="6 3 12 9 18 3"></polyline><line x1="6" y1="13" x2="18" y2="13"></line><line x1="6" y1="17" x2="18" y2="17"></line></svg> 支援履歴（売上明細）
                </a>
                <a href="stripe.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" height="10"></line></svg> 振込先・口座管理
                </a>
                <div class="nav-divider"></div>
                <a href="guide.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg> 使い方ガイド
                </a>
                <a href="faq.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg> よくある質問 (FAQ)
                </a>
                <a href="contact.html" class="nav-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg> お問い合わせ
                </a>
            </nav>
            <div class="account-wrapper">
                <div class="account-btn">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span id="sidebarUserName">マイアカウント</span>
                </div>
            </div>
        </aside>

        <main class="main-content fade-in">
            <div class="card" style="text-align: center; padding: 32px 20px;">
                <p style="font-size: 13px; color: var(--text-sub); margin: 0 0 4px 0; font-weight: 700; letter-spacing: 1px;">CURRENT BALANCE</p>
                <h2 style="font-size: 36px; font-weight: 800; margin: 0; letter-spacing: -1px;" id="totalBalanceText">¥0</h2>
                <p style="font-size: 11px; color: var(--text-sub); margin: 8px 0 0 0;">※現在の残高 ＝ 支援金の総額 − 引き出し済みの総額</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">支援履歴・売上明細</h2>
                    <p style="font-size: 13px; color: var(--text-sub); margin: 4px 0 0 0;">読者からの支援および売上の引き出し履歴がタイムライン順に表示されます。</p>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>日時</th>
                                <th>内容 / 対象作品</th>
                                <th>状態</th>
                                <th style="text-align: right;">金額 (ネット金額)</th>
                            </tr>
                        </thead>
                        <tbody id="salesTableBody">
                            <tr>
                                <td colspan="4" style="text-align: center; color: var(--text-sub); padding: 40px 0;">履歴を読み込み中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <footer class="site-footer">
                <p style="margin: 0;">&copy; 2026 KANKETSU</p>
            </footer>
        </main>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://cfeejhwshvluyecqvgjd.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_UTcLPc5ZZambRYLGwst-jw_kvhFyS7m';
            const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            let currentUserId = null;
            let isSalesInitializing = false;

            window.initSalesPage = async function() {
                if (!document.getElementById('sales-container')) return;
                if (isSalesInitializing) return;
                isSalesInitializing = true;

                try {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    if (!session) { window.location.href = 'login.html'; isSalesInitializing = false; return; }
                    currentUserId = session.user.id;

                    // サイドバーのペンネーム取得
                    let { data: creator } = await supabaseClient.from('creators').select('pen_name').eq('id', currentUserId).single();
                    if (creator && creator.pen_name && creator.pen_name !== '未設定') {
                        document.getElementById('sidebarUserName').innerText = creator.pen_name;
                    }

                    // 1. 読者からの支援履歴（Donations）を取得
                    const { data: donations, error: donErr } = await supabaseClient
                        .from('donations')
                        .select('*, works(title)')
                        .eq('creator_id', currentUserId);
                    
                    if (donErr) throw donErr;

                    // 2. 将来的に連動する「引き出し履歴（Withdrawals）」を取得（現在はテストモックをブレンド）
                    // 本番環境やテーブル作成後は、ここを実際のテーブル参照（supabaseClient.from('withdrawals')...）に書き換えてください。
                    const mockWithdrawals = [
                        // テスト用に過去に引き出しを行った履歴のシミュレートデータ
                        { id: 'w1', created_at: '2026-06-20T12:00:00Z', amount: 3000, status: 'completed', type: 'withdraw' }
                    ];

                    // データを1つのタイムラインに結合してソートするロジック
                    let timelineItems = [];

                    // 支援金をプラスデータとして追加
                    if (donations) {
                        donations.forEach(d => {
                            timelineItems.push({
                                date: new Date(d.created_at),
                                displayDate: new Date(d.created_at).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute:'2-digit' }),
                                description: d.works ? `📖 支援: ${d.works.title}` : '🤝 全体への支援 (作品指定なし)',
                                isWithdraw: false,
                                status: d.status, // 'pending'（保留中） or 'completed'（完了）
                                amount: Number(d.net_amount)
                            });
                        });
                    }

                    // 引き出し履歴をマイナスデータとして追加
                    mockWithdrawals.forEach(w => {
                        timelineItems.push({
                            date: new Date(w.created_at),
                            displayDate: new Date(w.created_at).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute:'2-digit' }),
                            description: '💰 売上の引き出し（銀行振込）',
                            isWithdraw: true,
                            status: w.status,
                            amount: Number(w.amount)
                        });
                    });

                    // 日付の新しい順（降順）に並び替え
                    timelineItems.sort((a, b) => b.date - a.date);

                    // 3. 計算：残高の算出（プラスの総和 − マイナスの総和）
                    let totalPlus = timelineItems.filter(i => !i.isWithdraw).reduce((sum, i) => sum + i.amount, 0);
                    let totalMinus = timelineItems.filter(i => i.isWithdraw).reduce((sum, i) => sum + i.amount, 0);
                    let currentBalance = totalPlus - totalMinus;

                    // 画面の合計金額（残高）を更新
                    document.getElementById('totalBalanceText').innerText = `¥${currentBalance.toLocaleString()}`;

                    // 4. テーブルのレンダリング
                    const tbody = document.getElementById('salesTableBody');
                    if (timelineItems.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-sub); padding: 40px 0;">売上・支援履歴はまだありません。</td></tr>`;
                    } else {
                        tbody.innerHTML = timelineItems.map(item => {
                            // 状態（ステータス）の判定
                            let statusBadge = '';
                            if (item.status === 'pending') {
                                statusBadge = `<span class="badge badge-warning">保留中</span>`;
                            } else {
                                statusBadge = `<span class="badge badge-success">完了</span>`;
                            }

                            // 金額のプラスマイナス表記切り替え
                            let amountDisplay = '';
                            if (item.isWithdraw) {
                                amountDisplay = `<span class="amount-minus">-¥${item.amount.toLocaleString()}</span>`;
                            } else {
                                amountDisplay = `<span class="amount-plus">+¥${item.amount.toLocaleString()}</span>`;
                            }

                            return `
                                <tr>
                                    <td style="color: var(--text-sub); font-size: 13px;">${item.displayDate}</td>
                                    <td style="font-weight: 600;">${item.description}</td>
                                    <td>${statusBadge}</td>
                                    <td style="text-align: right;">${amountDisplay}</td>
                                </tr>
                            `;
                        }).join('');
                    }

                } catch (error) {
                    console.error("Sales Page Error:", error);
                    document.getElementById('salesTableBody').innerHTML = `<tr><td colspan="4" style="text-align: center; color: #dc2626; padding: 40px 0;">データの読み込みに失敗しました。</td></tr>`;
                } finally {
                    isSalesInitializing = false;
                }
            };

            window.toggleSidebar = function() { 
                document.getElementById('sidebar').classList.toggle('open'); 
                document.getElementById('sidebarOverlay').classList.toggle('show'); 
            };

            if (!window.hasRegisteredSales) {
                document.addEventListener('turbo:load', window.initSalesPage);
                window.hasRegisteredSales = true;
            }
            window.initSalesPage();
        })();
    </script>
</body>
</html>
